<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>各部门AI使用能力诊断看板</title>
<style>
  :root {
    --bg: #f5f3f0; --card: #ffffff; --primary: #5b7a8a; --primary-light: #e8eef1;
    --success: #7a9a6d; --success-light: #e8f0e4; --warning: #c4a35a; --warning-light: #f5f0e0;
    --gray-50: #faf9f7; --gray-100: #f0eeeb; --gray-200: #e0ddd8; --gray-300: #c8c4be;
    --gray-400: #a09b94; --gray-500: #7a756e; --gray-600: #5c5750; --gray-700: #3e3a35;
    --gray-800: #2a2724; --gray-900: #1a1816;
    --shadow: 0 1px 4px rgba(0,0,0,.06); --shadow-md: 0 4px 12px rgba(0,0,0,.08); --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background:var(--bg); color:var(--gray-700); line-height:1.7; font-size:17px; }
  .container { max-width:1400px; margin:0 auto; padding:28px 20px; }

  .header { text-align:center; padding:40px 0 28px; }
  .header h1 { font-size:32px; font-weight:700; color:var(--gray-900); margin-bottom:6px; }
  .header p { color:var(--gray-500); font-size:17px; }
  .header .meta { display:inline-flex; align-items:center; gap:6px; background:var(--gray-100); color:var(--gray-500); padding:5px 16px; border-radius:20px; font-size:14px; margin-top:10px; }

  .tabs { display:flex; gap:4px; margin-bottom:22px; background:var(--gray-100); padding:4px; border-radius:12px; width:fit-content; }
  .tab { padding:10px 28px; border-radius:10px; border:none; background:transparent; cursor:pointer; font-size:16px; color:var(--gray-500); font-weight:500; transition:all .2s; }
  .tab.active { background:var(--card); color:var(--primary); box-shadow:var(--shadow); }
  .tab:hover { color:var(--gray-800); }
  .tab-content { display:none; } .tab-content.active { display:block; }

  .filter-bar { display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; }
  .filter-btn { padding:8px 20px; border-radius:22px; border:1.5px solid var(--gray-200); background:var(--card); cursor:pointer; font-size:15px; color:var(--gray-500); font-weight:500; transition:all .2s; display:flex; align-items:center; gap:6px; }
  .filter-btn:hover { border-color:var(--primary); color:var(--primary); }
  .filter-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

  .scale-wrap { background:var(--card); border-radius:var(--radius); padding:22px 26px 18px; box-shadow:var(--shadow); margin-bottom:22px; }
  .scale-wrap h3 { font-size:16px; font-weight:600; color:var(--gray-700); margin-bottom:14px; }
  .scale-bar { display:flex; gap:2px; height:36px; border-radius:8px; overflow:hidden; }
  .scale-seg { flex:1; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:600; cursor:pointer; transition:filter .15s,transform .15s; }
  .scale-seg:hover { filter:brightness(1.1); transform:scaleY(1.1); z-index:1; }
  .scale-names { display:flex; gap:2px; margin-top:4px; }
  .scale-names span { flex:1; text-align:center; font-size:10px; color:var(--gray-400); line-height:1.3; }
  .scale-expand-btn { font-size:14px; color:var(--primary); cursor:pointer; border:none; background:none; padding:6px 0; margin-top:6px; }
  .scale-expand-btn:hover { text-decoration:underline; }
  .scale-detail-grid { display:none; margin-top:12px; display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:8px; }
  .scale-detail-grid.collapsed { display:none; }
  .sd-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px; background:var(--gray-50); }
  .sd-num { width:30px; height:30px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; flex-shrink:0; }
  .sd-text strong { font-size:14px; color:var(--gray-700); display:block; }
  .sd-text span { font-size:12px; color:var(--gray-400); line-height:1.4; }

  .dept-grid { display:grid; gap:22px; }
  .dept-card { background:var(--card); border-radius:var(--radius); padding:28px; box-shadow:var(--shadow); }
  .dept-card:hover { box-shadow:var(--shadow-md); }
  .dept-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .dept-name { display:flex; align-items:center; gap:12px; }
  .dept-icon { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; }
  .dept-name h3 { font-size:22px; font-weight:600; color:var(--gray-900); }
  .level-tag { display:inline-block; padding:3px 12px; border-radius:20px; font-size:15px; font-weight:500; margin-top:2px; }
  .score-badge { font-size:36px; font-weight:700; letter-spacing:-1px; }
  .score-sub { font-size:15px; font-weight:400; color:var(--gray-400); margin-left:2px; }

  /* Range progress bar */
  .range-bar { position:relative; height:18px; background:var(--gray-100); border-radius:9px; overflow:visible; margin-bottom:4px; }
  .range-band { position:absolute; height:100%; border-radius:9px; opacity:.25; }
  .range-fill { position:absolute; height:100%; border-radius:9px; left:0; top:0; }
  .range-mkr { position:absolute; top:-5px; width:4px; height:28px; border-radius:2px; z-index:3; transform:translateX(-50%); }
  .range-mkr-label { position:absolute; top:-24px; font-size:12px; font-weight:700; white-space:nowrap; transform:translateX(-50%); }
  .range-mkr-btm { position:absolute; top:28px; font-size:11px; font-weight:500; white-space:nowrap; transform:translateX(-50%); }
  .score-bar-labels { display:flex; justify-content:space-between; font-size:13px; color:var(--gray-400); margin-bottom:8px; margin-top:28px; }

  .mini-scale-wrap { margin-bottom:16px; }
  .mini-scale { display:flex; gap:1px; height:10px; border-radius:5px; overflow:hidden; position:relative; }
  .mini-seg { flex:1; }
  .mini-marker { position:absolute; top:-4px; width:3px; height:18px; border-radius:2px; background:var(--gray-800); z-index:2; transform:translateX(-50%); }
  .mini-marker-label { position:absolute; top:-22px; font-size:10px; font-weight:700; color:var(--gray-700); white-space:nowrap; transform:translateX(-50%); }
  .mini-names { display:flex; gap:1px; margin-top:3px; }
  .mini-names span { flex:1; text-align:center; font-size:8.5px; color:var(--gray-400); line-height:1.2; overflow:hidden; }

  .toggle-wrap { margin-top:12px; }
  .toggle-btn { font-size:16px; color:var(--gray-500); cursor:pointer; user-select:none; display:inline-flex; align-items:center; gap:5px; padding:5px 0; border:none; background:none; font-weight:500; }
  .toggle-btn::before { content:'▸'; font-size:12px; transition:transform .2s; display:inline-block; }
  .toggle-btn.open::before { transform:rotate(90deg); }
  .toggle-btn:hover { color:var(--gray-700); }
  .toggle-body { display:none; padding-top:8px; }
  .toggle-body.open { display:block; }

  .evidence-list li { font-size:16px; color:var(--gray-600); margin-bottom:5px; list-style:none; position:relative; padding-left:14px; }
  .evidence-list li::before { content:'·'; position:absolute; left:0; color:var(--gray-300); font-weight:bold; font-size:20px; line-height:1; }

  .teams-wrap { margin-top:14px; padding-top:12px; border-top:1px dashed var(--gray-200); }
  .teams-title { font-size:14px; color:var(--gray-400); margin-bottom:8px; }
  .team-row { display:flex; align-items:center; gap:14px; padding:5px 0; }
  .team-name { font-size:15px; color:var(--gray-600); min-width:100px; }
  .team-bar-bg { flex:1; height:9px; background:var(--gray-100); border-radius:5px; overflow:hidden; }
  .team-bar-fill { height:100%; border-radius:5px; }
  .team-score { font-size:15px; font-weight:600; min-width:30px; text-align:right; }

  /* Current stage plan */
  .plan-section { margin-top:14px; padding:16px 18px; background:var(--gray-50); border-radius:10px; border:1px solid var(--gray-200); }
  .plan-title { font-size:15px; font-weight:600; color:var(--gray-700); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
  .plan-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
  .plan-card { padding:10px 14px; background:var(--card); border-radius:8px; border-left:3px solid var(--gray-200); }
  .plan-card.daily { border-left-color:#8a9a98; }
  .plan-card.challenge { border-left-color:#6d8a9a; }
  .plan-card.tip { border-left-color:#c4a35a; }
  .plan-card.track { border-left-color:#9a8a8a; }
  .plan-cat { font-size:11px; font-weight:600; padding:1px 8px; border-radius:4px; display:inline-block; margin-bottom:4px; }
  .plan-cat.daily { background:#e8eef1; color:#5b7a8a; }
  .plan-cat.challenge { background:#e0e8ee; color:#4a6a7a; }
  .plan-cat.tip { background:#f5f0e0; color:#a08030; }
  .plan-cat.track { background:#eee8e4; color:#7a6a5a; }
  .plan-text { font-size:14px; color:var(--gray-600); line-height:1.6; }
  .plan-check { display:flex; align-items:flex-start; gap:8px; margin-top:4px; }
  .plan-check input { margin-top:5px; accent-color:var(--primary); }
  .plan-check label { font-size:15px; color:var(--gray-600); cursor:pointer; line-height:1.5; }

  /* Roadmap */
  .roadmap { margin-top:18px; padding-top:16px; border-top:1px solid var(--gray-100); }
  .roadmap-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
  .roadmap-head .label { font-size:16px; font-weight:600; color:var(--gray-700); }
  .target-tag { font-size:14px; padding:4px 14px; border-radius:20px; font-weight:500; margin-left:auto; }
  .target-note { font-size:14px; color:var(--gray-500); margin-bottom:16px; padding:8px 14px; background:var(--gray-50); border-radius:8px; border-left:3px solid var(--gray-300); }
  .target-note strong { color:var(--gray-700); }

  .journey-bar { position:relative; margin:0 0 18px; }
  .journey-track { height:8px; background:var(--gray-200); border-radius:4px; position:relative; }
  .journey-fill { height:100%; border-radius:4px; position:absolute; left:0; top:0; }
  .journey-target-fill { height:100%; border-radius:4px; position:absolute; top:0; opacity:.2; }
  .journey-dot { width:16px; height:16px; border-radius:50%; border:3px solid #fff; position:absolute; top:50%; transform:translate(-50%,-50%); z-index:2; box-shadow:0 1px 4px rgba(0,0,0,.15); }
  .journey-label { position:absolute; top:16px; transform:translateX(-50%); font-size:12px; font-weight:600; white-space:nowrap; }
  .journey-end-labels { display:flex; justify-content:space-between; font-size:12px; color:var(--gray-400); margin-top:4px; }

  .milestones { padding-left:22px; }
  .ms { position:relative; padding:0 0 20px 22px; }
  .ms:last-child { padding-bottom:0; }
  .ms::before { content:''; position:absolute; left:-22px; top:8px; bottom:-4px; width:2px; background:var(--gray-200); }
  .ms:last-child::before { display:none; }
  .ms-dot { width:14px; height:14px; border-radius:50%; position:absolute; left:-28px; top:5px; z-index:1; border:2.5px solid #fff; }
  .ms-dot.done { box-shadow:0 0 0 2px var(--success); }
  .ms-dot.now { box-shadow:0 0 0 2px var(--primary); animation:pulse 2s infinite; }
  .ms-dot.later { box-shadow:0 0 0 2px var(--gray-300); opacity:.6; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 2px var(--primary);} 50%{box-shadow:0 0 0 5px rgba(91,122,138,.2);} }
  .ms-level { font-size:14px; font-weight:600; margin-bottom:3px; }
  .ms-status { font-size:16px; font-weight:600; color:var(--gray-800); margin-bottom:6px; }
  .ms-items { display:flex; flex-direction:column; gap:5px; }
  .ms-item { font-size:15px; color:var(--gray-600); padding:6px 12px; background:var(--gray-50); border-radius:7px; border-left:3px solid var(--gray-200); line-height:1.6; }
  .ms-item.skill { border-left-color:var(--primary); }
  .ms-item.action { border-left-color:var(--success); }
  .ms-item.vision { border-left-color:var(--warning); }
  .ms-tag { font-size:11px; font-weight:600; padding:1px 7px; border-radius:4px; margin-right:5px; }
  .ms-tag.sk { background:var(--primary-light); color:var(--primary); }
  .ms-tag.ac { background:var(--success-light); color:var(--success); }
  .ms-tag.vi { background:var(--warning-light); color:var(--warning); }

  .req-section { margin-bottom:26px; }
  .req-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid var(--gray-100); }
  .req-header h3 { font-size:18px; font-weight:600; color:var(--gray-900); }
  .req-header .count { font-size:14px; color:var(--gray-400); margin-left:auto; }
  .req-grid { display:grid; gap:10px; }
  .req-card { display:flex; gap:12px; padding:14px 18px; background:var(--card); border-radius:10px; box-shadow:var(--shadow); }
  .req-pri { font-size:12px; font-weight:600; padding:2px 10px; border-radius:5px; white-space:nowrap; height:fit-content; margin-top:2px; }
  .req-pri.high { background:#f0e0dc; color:#8b5a4a; }
  .req-pri.mid { background:#f0ead8; color:#8a7640; }
  .req-pri.low { background:#dde8d8; color:#5a7a4e; }
  .req-body h5 { font-size:16px; font-weight:600; color:var(--gray-800); margin-bottom:3px; }
  .req-body p { font-size:15px; color:var(--gray-500); }
  .req-ai { font-size:14px; color:var(--primary); margin-top:5px; padding:3px 10px; background:var(--primary-light); border-radius:5px; display:inline-block; }

  .tooltip { position:absolute; background:var(--gray-800); color:#fff; padding:8px 14px; border-radius:8px; font-size:14px; line-height:1.5; z-index:100; pointer-events:none; white-space:nowrap; box-shadow:var(--shadow-md); }
  .tooltip::after { content:''; position:absolute; bottom:-5px; left:50%; transform:translateX(-50%); border-left:5px solid transparent; border-right:5px solid transparent; border-top:5px solid var(--gray-800); }

  /* Track tab */
  .track-mod-btns { display:flex; gap:4px; margin-bottom:18px; background:var(--gray-100); padding:4px; border-radius:10px; width:fit-content; }
  .track-mod-btn { padding:8px 22px; border-radius:8px; border:none; background:transparent; cursor:pointer; font-size:15px; color:var(--gray-500); font-weight:500; transition:all .2s; }
  .track-mod-btn.active { background:var(--card); color:var(--primary); box-shadow:var(--shadow); }
  .track-mod-btn:hover { color:var(--gray-800); }
  .track-mod { display:none; } .track-mod.active { display:block; }

  .chart-card { background:var(--card); border-radius:var(--radius); padding:24px 28px; box-shadow:var(--shadow); margin-bottom:18px; }
  .chart-card-head { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .chart-card-head h3 { font-size:20px; font-weight:600; color:var(--gray-900); }
  .chart-card-head .ch-tag { font-size:14px; padding:3px 12px; border-radius:20px; font-weight:500; }
  .chart-svg-wrap { width:100%; overflow:hidden; }
  .chart-legend { display:flex; gap:20px; margin-top:12px; font-size:13px; color:var(--gray-500); }
  .chart-legend span { display:flex; align-items:center; gap:6px; }
  .chart-legend .dot { width:10px; height:10px; border-radius:50%; }
  .chart-legend .dash { width:20px; height:2px; border-top:2px dashed; }
  .chart-empty { text-align:center; padding:30px; color:var(--gray-400); font-size:15px; }

  .log-card { background:var(--card); border-radius:var(--radius); padding:24px 28px; box-shadow:var(--shadow); margin-bottom:18px; }
  .log-card h3 { font-size:20px; font-weight:600; color:var(--gray-900); margin-bottom:16px; display:flex; align-items:center; gap:10px; }
  .log-timeline { position:relative; padding-left:24px; }
  .log-item { position:relative; padding:12px 18px; margin-bottom:14px; background:var(--gray-50); border-radius:10px; border-left:3px solid var(--gray-300); }
  .log-item::before { content:''; position:absolute; left:-27px; top:18px; width:12px; height:12px; border-radius:50%; background:var(--primary); border:2px solid #fff; box-shadow:0 0 0 2px var(--primary); }
  .log-date { font-size:13px; color:var(--gray-400); font-weight:500; margin-bottom:4px; }
  .log-dept { font-size:16px; font-weight:600; color:var(--gray-800); margin-bottom:4px; }
  .log-text { font-size:15px; color:var(--gray-600); line-height:1.6; }
  .log-next { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--primary); margin-top:6px; padding:2px 10px; background:var(--primary-light); border-radius:5px; }

  .freq-card { background:var(--card); border-radius:var(--radius); padding:24px 28px; box-shadow:var(--shadow); margin-bottom:18px; }
  .freq-card h3 { font-size:20px; font-weight:600; color:var(--gray-900); margin-bottom:16px; display:flex; align-items:center; gap:10px; }
  .freq-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
  .freq-item { padding:14px 18px; background:var(--gray-50); border-radius:10px; display:flex; align-items:center; gap:14px; }
  .freq-icon { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .freq-info h4 { font-size:16px; font-weight:600; color:var(--gray-800); }
  .freq-info p { font-size:14px; color:var(--gray-500); }
  .freq-info .freq-count { font-size:22px; font-weight:700; margin-top:2px; }

  @media(max-width:768px){
    .container { padding:16px 12px; }
    .header h1 { font-size:24px; }
    .dept-card { padding:18px; }
    .scale-detail-grid { grid-template-columns:1fr; }
    .plan-grid { grid-template-columns:1fr; }
    .freq-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>各部门 AI 使用能力诊断</h1>
    <p>商业分析部 · 基于部门访谈与实际工作场景评估</p>
    <div class="meta">诊断日期：2025年3月</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('diag')">能力诊断</button>
    <button class="tab" onclick="switchTab('reqs')">部门需求</button>
    <button class="tab" onclick="switchTab('track')">进度追踪</button>
  </div>
  <div id="tab-diag" class="tab-content active">
    <div class="scale-wrap" id="scaleWrap"></div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="dept-grid" id="deptGrid"></div>
  </div>
  <div id="tab-reqs" class="tab-content">
    <div class="filter-bar" id="reqFilterBar"></div>
    <div id="reqWrap"></div>
  </div>
  <div id="tab-track" class="tab-content">
    <div class="track-mod-btns">
      <button class="track-mod-btn active" onclick="switchTrackMod('chart')">📈 爬山图</button>
      <button class="track-mod-btn" onclick="switchTrackMod('log')">📋 日志与进度</button>
    </div>
    <div id="mod-chart" class="track-mod active">
      <div class="filter-bar" id="trackFilterBar"></div>
      <div id="chartWrap"></div>
    </div>
    <div id="mod-log" class="track-mod">
      <div id="logWrap"></div>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
const M=['#b0b8b4','#8e9a98','#7a9a99','#6d8a9a','#7a8a9e','#8a7f9a','#9a8a8a','#9a7a7a','#8a6a6a','#7a5a5a','#6a4a4a'];
const LEVELS=[
  {level:0,name:'零基础',desc:'完全不使用任何AI工具',color:M[0]},
  {level:1,name:'入门聊天',desc:'使用飞书内置豆包，仅限基础聊天问答',color:M[1]},
  {level:2,name:'国产大模型对话',desc:'使用Kimi/DeepSeek等国产大模型进行对话交流',color:M[2]},
  {level:3,name:'国际大模型对话',desc:'使用GPT/Claude等国外大模型进行对话交流',color:M[3]},
  {level:4,name:'国产AI介入工作',desc:'用国产大模型辅助创建文档、修改内容、撰写报告等',color:M[4]},
  {level:5,name:'国际AI介入工作',desc:'用GPT/Claude进行文件处理、报告撰写、数据整理',color:M[5]},
  {level:6,name:'深度数据分析',desc:'用AI做深度数据清洗、统计分析、建模、交叉验证',color:M[6]},
  {level:7,name:'AI辅助编程',desc:'让AI编写Python/SQL/VBA脚本，搭建数据管道',color:M[7]},
  {level:8,name:'自动化工作流',desc:'定时自动化：API取数、飞书机器人推送、工作流编排',color:M[8]},
  {level:9,name:'多模态与智能体',desc:'AI操控电脑、图像视频生成、多Agent协作、复杂决策链',color:M[9]},
  {level:10,name:'全流程深度集成',desc:'AI贯穿全业务链：采集→清洗→分析→决策→执行→监控',color:M[10]},

  LEVELS.forEach(lv=>{h+=`<div class="scale-seg" style="background:${lv.color}" onmouseenter="tip(event,'Lv.${lv.level} ${lv.name}\\n${lv.desc}')" onmouseleave="untip()">${lv.level}</div>`;});
  h+='</div><div class="scale-names">';
  LEVELS.forEach(lv=>{h+=`<span>${lv.name}</span>`;});
  h+=`</div><button class="scale-expand-btn" onclick="togScale(this)">▸ 展开各等级详情</button>`;
  h+=`<div class="scale-detail-grid collapsed" id="sdGrid">`;
  LEVELS.forEach(lv=>{h+=`<div class="sd-item"><div class="sd-num" style="background:${lv.color}">${lv.level}</div><div class="sd-text"><strong>${lv.name}</strong><span>${lv.desc}</span></div></div>`;});
  h+='</div>';w.innerHTML=h;
}
function togScale(b){const d=document.getElementById('sdGrid');const c=d.classList.toggle('collapsed');b.textContent=c?'▸ 展开各等级详情':'▾ 收起等级详情';}

const DISPLAY_ORDER=['商业分析部','市场部','人事部','财务部','产品部'];
function orderedDepts(){return DISPLAY_ORDER.map(n=>DEPARTMENTS.find(d=>d.name===n)).filter(Boolean);}

function renderFilters(id,key){
  const b=document.getElementById(id);
  let h=`<button class="filter-btn active" onclick="filt('${key}','all',this)">📋 全部</button>`;
  orderedDepts().forEach(d=>{h+=`<button class="filter-btn" onclick="filt('${key}','${d.name}',this)">${d.icon} ${d.name}</button>`;});
  b.innerHTML=h;
}
function filt(key,val,btn){
  if(key==='d'){deptFilter=val;renderCards();}else{reqFilter=val;renderReqs();}
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function miniScale(score,partialScore){
  const ds=score!==null?score:partialScore;
  if(ds===undefined||ds===null)return '';
  const pct=(ds/10*100).toFixed(1);
  let h='<div class="mini-scale-wrap"><div class="mini-scale">';
  LEVELS.forEach(lv=>{h+=`<div class="mini-seg" style="background:${lv.color}"></div>`;});
  h+=`<div class="mini-marker" style="left:${pct}%"><span class="mini-marker-label">${score!==null?'Lv.'+ds:'已知Lv.'+ds}</span></div>`;
  h+='</div><div class="mini-names">';
  LEVELS.forEach(lv=>{h+=`<span>${lv.name}</span>`;});
  h+='</div></div>';return h;
}

function renderRangeBar(dept){
  const hasS=dept.score!==null;
  const ds=hasS?dept.score:dept.partialScore;
  const c=hasS?clr(dept.score):(dept.partialScore?clr(dept.partialScore):'var(--gray-300)');
  const pct=ds?(ds/10*100).toFixed(1):'0';

  let h=`<div class="range-bar">`;
  // range band
  if(dept.range){
    const minP=(dept.range.min/10*100).toFixed(1);
    const maxP=(dept.range.max/10*100).toFixed(1);
    const bandW=(maxP-minP).toFixed(1);
    h+=`<div class="range-band" style="left:${minP}%;width:${bandW}%;background:${c}"></div>`;
    // min marker
    h+=`<div class="range-mkr" style="left:${minP}%;background:var(--gray-700)"></div>`;
    h+=`<span class="range-mkr-btm" style="left:${minP}%;color:var(--gray-700)">下限 Lv.${dept.range.min} ${dept.range.minName}</span>`;
    // max marker
    h+=`<div class="range-mkr" style="left:${maxP}%;background:var(--gray-700)"></div>`;
    h+=`<span class="range-mkr-btm" style="left:${maxP}%;color:var(--gray-700)">上限 Lv.${dept.range.max} ${dept.range.maxName}</span>`;
  }
  // avg fill
  h+=`<div class="range-fill" style="width:${pct}%;background:${c}${!hasS?';opacity:.5':''}"></div>`;
  // avg marker
  if(ds){
    h+=`<div class="range-mkr" style="left:${pct}%;background:var(--gray-800)"></div>`;
    h+=`<span class="range-mkr-label" style="left:${pct}%;color:var(--gray-800)">${hasS?'均值 Lv.'+ds:'已知 Lv.'+ds}</span>`;
  }
  h+=`</div>`;
  h+=`<div class="score-bar-labels"><span>Lv.0</span><span>Lv.5</span><span>Lv.10</span></div>`;
  return h;
}

function renderPlan(dept){
  if(!dept.currentPlan||!dept.currentPlan.length)return '';
  let h=`<div class="toggle-wrap"><button class="toggle-btn" onclick="tog(this)">📋 当前阶段提效方案</button><div class="toggle-body">`;
  h+=`<div class="plan-section"><div class="plan-title">结合业务场景的即刻可做事项</div><div class="plan-grid">`;
  const icons={daily:'🔄',challenge:'🎯',tip:'💡',track:'📊'};
  const labels={daily:'每日练习',challenge:'阶段挑战',tip:'实用技巧',track:'进度管理'};
  dept.currentPlan.forEach(p=>{
    h+=`<div class="plan-card ${p.cat}"><div class="plan-cat ${p.cat}">${icons[p.cat]} ${labels[p.cat]||p.label}</div>`;
    p.items.forEach((item,idx)=>{
      const uid=dept.name+'_'+p.cat+'_'+idx;
      h+=`<div class="plan-check"><input type="checkbox" id="${uid}"><label for="${uid}">${item}</label></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div></div></div></div>`;
  return h;
}

function renderCards(){
  const g=document.getElementById('deptGrid');
  const list=deptFilter==='all'?orderedDepts():orderedDepts().filter(d=>d.name===deptFilter);
  g.innerHTML=list.map(dept=>{
    const rm=ROADMAPS.find(r=>r.dept===dept.name);
    const hasS=dept.score!==null;
    const c=hasS?clr(dept.score):(dept.partialScore?clr(dept.partialScore):'var(--gray-300)');
    let h=`<div class="dept-card">`;
    h+=`<div class="dept-header"><div class="dept-name">
      <div class="dept-icon" style="background:${dept.color}18;color:${dept.color}">${dept.icon}</div>
      <div><h3>${dept.name}</h3><span class="level-tag" style="background:${c}18;color:${c}">${hasS?'Lv.'+dept.score:(dept.partialScore?'部分评估 Lv.'+dept.partialScore:'待评估')} ${dept.levelName}</span></div>
    </div>
    <div class="score-badge" style="color:${c}">${hasS?dept.score:(dept.partialScore?'~'+dept.partialScore:'—')}<span class="score-sub">${(hasS||dept.partialScore)?'/10':''}</span></div></div>`;
    h+=renderRangeBar(dept);
    h+=miniScale(dept.score,dept.partialScore);
    // evidence
    h+=`<div class="toggle-wrap"><button class="toggle-btn" onclick="tog(this)">诊断依据（${dept.evidence.length}项）</button><div class="toggle-body"><ul class="evidence-list">`;
    dept.evidence.forEach(e=>{h+=`<li>${e}</li>`;});
    h+=`</ul></div></div>`;
    // current plan
    h+=renderPlan(dept);
    // teams
    if(dept.teams&&dept.teams.length){
      h+=`<div class="teams-wrap"><div class="teams-title">团队细分</div>`;
      dept.teams.forEach(t=>{
        const tp=(t.score/10*100).toFixed(1),tc=clr(t.score);
        h+=`<div class="team-row"><span class="team-name">${t.name}</span><div class="team-bar-bg"><div class="team-bar-fill" style="width:${tp}%;background:${tc}"></div></div><span class="team-score" style="color:${tc}">${t.score}</span></div>`;
      });
      h+=`</div>`;
    }
    // roadmap
    if(rm){
      const hasTgt=rm.tgt!==null,hasCur=rm.cur!==null;
      const tgtC=hasTgt?clr(rm.tgt):'var(--gray-400)';
      const curC=hasCur?clr(rm.cur):c;
      const curPct=hasCur?(rm.cur/10*100).toFixed(1):'0';
      const tgtPct=hasTgt?(rm.tgt/10*100).toFixed(1):'0';
      h+=`<div class="roadmap"><div class="roadmap-head"><span class="label">🚀 提升路径</span>`;
      h+=hasTgt?`<span class="target-tag" style="background:${tgtC}18;color:${tgtC}">🎯 目标 Lv.${rm.tgt} ${LEVELS[rm.tgt].name}</span>`
               :`<span class="target-tag" style="background:var(--gray-100);color:var(--gray-400)">🎯 目标待定</span>`;
      h+=`</div><div class="target-note"><strong>说明：</strong>${rm.note}</div>`;
      if(hasCur&&hasTgt){
        h+=`<div class="journey-bar"><div class="journey-track">
          <div class="journey-target-fill" style="width:${tgtPct}%;background:${tgtC}"></div>
          <div class="journey-fill" style="width:${curPct}%;background:${curC}"></div>
          <div class="journey-dot" style="left:${curPct}%;background:${curC}"></div>
          <div class="journey-dot" style="left:${tgtPct}%;background:${tgtC};border-style:dashed;opacity:.7"></div>
          <span class="journey-label" style="left:${curPct}%;color:${curC}">当前 Lv.${rm.cur}</span>
          <span class="journey-label" style="left:${tgtPct}%;color:${tgtC}">目标 Lv.${rm.tgt}</span>
        </div></div><div class="journey-end-labels"><span>Lv.0</span><span>Lv.5</span><span>Lv.10</span></div>`;
      }
      if(rm.milestones.length){
        h+=`<div class="toggle-wrap" style="margin-top:12px"><button class="toggle-btn" onclick="tog(this)">分阶段里程碑（${rm.milestones.length}阶段）</button><div class="toggle-body"><div class="milestones">`;
        rm.milestones.forEach(ms=>{
          const fromLv=Math.floor(ms.from),toLv=ms.to;
          const curLv=rm.cur||0;
          const done=curLv>=toLv,now=curLv>=fromLv&&curLv<toLv;
          const dc=done?'done':(now?'now':'later');
          const dotC=done?'var(--success)':(now?'var(--primary)':'var(--gray-300)');
          const msC=clr(toLv);
          h+=`<div class="ms"><div class="ms-dot ${dc}" style="background:${dotC}"></div>`;
          h+=`<div class="ms-level" style="color:${msC}">${ms.label}</div>`;
          h+=`<div class="ms-status">${done?'✅ 已达成':(now?'🔄 当前阶段':'⏳ 待启动')}</div>`;
          h+=`<div class="ms-items">`;
          ms.skills.forEach(s=>{
            const cls=s.t==='sk'?'skill':(s.t==='ac'?'action':'vision');
            const tag=s.t==='sk'?'能力':(s.t==='ac'?'行动':'愿景');
            const tagCls=s.t==='vi'?'vi':s.t;
            h+=`<div class="ms-item ${cls}"><span class="ms-tag ${tagCls}">${tag}</span>${s.s}</div>`;
          });
          h+=`</div></div>`;
        });
        h+=`</div></div></div>`;
      }
      h+=`</div>`;
    }
    h+=`</div>`;return h;
  }).join('');
}

function renderReqs(){
  const w=document.getElementById('reqWrap');
  const ordReqs=DISPLAY_ORDER.map(n=>REQS.find(r=>r.dept===n)).filter(Boolean);
  const list=reqFilter==='all'?ordReqs:ordReqs.filter(r=>r.dept===reqFilter);
  w.innerHTML=list.map(r=>{
    const hc=r.items.filter(i=>i.pri==='high').length;
    let h=`<div class="req-section"><div class="req-header">
      <div style="background:${r.color}18;color:${r.color};width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;">${r.icon}</div>
      <h3>${r.dept}</h3><span class="count">${r.items.length}项需求 · ${hc}项高优</span></div><div class="req-grid">`;
    r.items.forEach(i=>{
      const pc=i.pri==='high'?'high':(i.pri==='mid'?'mid':'low');
      const pl=i.pri==='high'?'高优':(i.pri==='mid'?'中优':'低优');
      h+=`<div class="req-card"><span class="req-pri ${pc}">${pl}</span><div class="req-body"><h5>${i.name}</h5><p>${i.desc}</p>${i.ai?`<span class="req-ai">💡 ${i.ai}</span>`:''}</div></div>`;
    });
    h+=`</div></div>`;return h;
  }).join('');
}

function switchTab(id){
  const tabs=['diag','reqs','track'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===id));
  tabs.forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===id));
  if(id==='track'){renderCharts();renderLogs();}
}
function switchTrackMod(mod){
  document.querySelectorAll('.track-mod-btn').forEach((b,i)=>b.classList.toggle('active',['chart','log'][i]===mod));
  ['mod-chart','mod-log'].forEach(m=>document.getElementById(m).classList.toggle('active',m==='mod-'+mod));
}
function tog(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open');}
function tip(e,t){const p=document.getElementById('tooltip');p.innerHTML=t.replace(/\\n/g,'<br>');p.style.display='block';const r=e.target.getBoundingClientRect();p.style.left=r.left+r.width/2-p.offsetWidth/2+'px';p.style.top=r.top-p.offsetHeight-10+window.scrollY+'px';}
function untip(){document.getElementById('tooltip').style.display='none';}

/* ── 爬山图渲染 ── */
function renderCharts(){
  // filters
  const fb=document.getElementById('trackFilterBar');
  let fh=`<button class="filter-btn ${trackFilter==='all'?'active':''}" onclick="filtTrack('all',this)">📋 全部</button>`;
  orderedDepts().forEach(d=>{fh+=`<button class="filter-btn ${trackFilter===d.name?'active':''}" onclick="filtTrack('${d.name}',this)">${d.icon} ${d.name}</button>`;});
  fb.innerHTML=fh;

  const w=document.getElementById('chartWrap');
  const allPD=DISPLAY_ORDER.map(n=>PROGRESS_DATA.find(p=>p.dept===n)).filter(Boolean);
  const list=trackFilter==='all'?allPD:allPD.filter(p=>p.dept===trackFilter);
  w.innerHTML=list.map(pd=>{
    const dept=DEPARTMENTS.find(d=>d.name===pd.dept);
    const c=dept?dept.color:'var(--gray-400)';
    const tgtLv=pd.target;
    let h=`<div class="chart-card">`;
    h+=`<div class="chart-card-head"><div class="dept-icon" style="background:${c}18;color:${c};width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;">${dept?dept.icon:'📁'}</div>`;
    h+=`<h3>${pd.dept}</h3>`;
    if(tgtLv!==null) h+=`<span class="ch-tag" style="background:${clr(tgtLv)}18;color:${clr(tgtLv)}">🎯 目标 Lv.${tgtLv}</span>`;
    h+=`</div>`;
    h+=renderMountainSVG(pd,c);
    h+=`<div class="chart-legend"><span><span class="dot" style="background:${c}"></span>实际得分</span>`;
    if(tgtLv!==null) h+=`<span><span class="dash" style="border-color:${clr(tgtLv)}"></span>目标线 Lv.${tgtLv}</span>`;
    h+=`</div></div>`;
    return h;
  }).join('');
}
function filtTrack(val,btn){
  trackFilter=val;
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCharts();
}

function renderMountainSVG(pd,color){
  const W=800,H=260,PAD={t:30,r:40,b:50,l:50};
  const cw=W-PAD.l-PAD.r, ch=H-PAD.t-PAD.b;
  const recs=pd.records;
  const tgt=pd.target;

  // 如果只有一个数据点，生成一个带未来虚线的起始图
  let svg=`<div class="chart-svg-wrap"><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">`;
  // 背景网格
  for(let i=0;i<=10;i+=2){
    const y=PAD.t+ch-ch*(i/10);
    svg+=`<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="var(--gray-200)" stroke-width="1"/>`;
    svg+=`<text x="${PAD.l-8}" y="${y+4}" text-anchor="end" fill="var(--gray-400)" font-size="12">Lv.${i}</text>`;
  }
  // 目标虚线
  if(tgt!==null){
    const ty=PAD.t+ch-ch*(tgt/10);
    svg+=`<line x1="${PAD.l}" y1="${ty}" x2="${W-PAD.r}" y2="${ty}" stroke="${clr(tgt)}" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>`;
    svg+=`<text x="${W-PAD.r+4}" y="${ty+4}" fill="${clr(tgt)}" font-size="12" font-weight="600">Lv.${tgt}</text>`;
  }

  if(recs.length===1){
    // 单点：显示一个大圆点 + 渐变区域暗示未来
    const score=recs[0].score;
    const x=PAD.l+cw*0.08;
    const y=PAD.t+ch-ch*(score/10);
    // 渐变填充区
    svg+=`<defs><linearGradient id="grad_${pd.dept.replace(/[^a-z]/gi,'')}" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${color}" stop-opacity="0.15"/><stop offset="1" stop-color="${color}" stop-opacity="0.03"/></linearGradient></defs>`;
    const baseY=PAD.t+ch;
    // 未来延伸虚线（水平保持当前分数）
    const futureX=PAD.l+cw*0.92;
    svg+=`<path d="M${x},${y} L${futureX},${y}" stroke="${color}" stroke-width="2" stroke-dasharray="6,4" opacity="0.3"/>`;
    // 填充区域
    svg+=`<path d="M${x},${y} L${futureX},${y} L${futureX},${baseY} L${x},${baseY} Z" fill="url(#grad_${pd.dept.replace(/[^a-z]/gi,'')})" />`;
    // 实心圆点
    svg+=`<circle cx="${x}" cy="${y}" r="7" fill="${color}" stroke="#fff" stroke-width="3"/>`;
    svg+=`<text x="${x}" y="${y-14}" text-anchor="middle" fill="${color}" font-size="14" font-weight="700">Lv.${score}</text>`;
    // 日期标签
    svg+=`<text x="${x}" y="${H-10}" text-anchor="middle" fill="var(--gray-400)" font-size="12">${recs[0].date.slice(5)}</text>`;
    // 未来占位
    svg+=`<text x="${PAD.l+cw*0.5}" y="${H-10}" text-anchor="middle" fill="var(--gray-300)" font-size="12">← 后续评估数据将在此更新 →</text>`;
  } else {
    // 多点：绘制折线面积图
    const step=cw/(recs.length-1);
    const pts=recs.map((r,i)=>({x:PAD.l+step*i, y:PAD.t+ch-ch*(r.score/10), s:r.score, d:r.date}));
    // 渐变
    svg+=`<defs><linearGradient id="grad_${pd.dept.replace(/[^a-z]/gi,'')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity="0.2"/><stop offset="1" stop-color="${color}" stop-opacity="0.02"/></linearGradient></defs>`;
    const baseY=PAD.t+ch;
    let areaPath=`M${pts[0].x},${pts[0].y}`;
    pts.slice(1).forEach(p=>{areaPath+=` L${p.x},${p.y}`;});
    areaPath+=` L${pts[pts.length-1].x},${baseY} L${pts[0].x},${baseY} Z`;
    svg+=`<path d="${areaPath}" fill="url(#grad_${pd.dept.replace(/[^a-z]/gi,'')})" />`;
    // 折线
    let linePath=`M${pts[0].x},${pts[0].y}`;
    pts.slice(1).forEach(p=>{linePath+=` L${p.x},${p.y}`;});
    svg+=`<path d="${linePath}" stroke="${color}" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
    // 圆点和标签
    pts.forEach(p=>{
      svg+=`<circle cx="${p.x}" cy="${p.y}" r="5" fill="${color}" stroke="#fff" stroke-width="2.5"/>`;
      svg+=`<text x="${p.x}" y="${p.y-12}" text-anchor="middle" fill="${color}" font-size="13" font-weight="700">Lv.${p.s}</text>`;
      svg+=`<text x="${p.x}" y="${H-10}" text-anchor="middle" fill="var(--gray-400)" font-size="11">${p.d.slice(5)}</text>`;
    });
  }
  svg+=`</svg></div>`;
  return svg;
}

/* ── 日志与进度渲染 ── */
function renderLogs(){
  const w=document.getElementById('logWrap');
  let h='';

  // 沟通频率卡片
  h+=`<div class="freq-card"><h3>📊 沟通频率总览</h3><div class="freq-grid">`;
  const deptNames=['市场部','人事部','财务部','产品部'];
  deptNames.forEach(dn=>{
    const dept=DEPARTMENTS.find(d=>d.name===dn);
    const logs=COMM_LOGS.filter(l=>l.dept===dn);
    const lastDate=logs.length?logs[logs.length-1].date:'尚未沟通';
    const c=dept?dept.color:'var(--gray-400)';
    h+=`<div class="freq-item"><div class="freq-icon" style="background:${c}18;color:${c}">${dept?dept.icon:'📁'}</div>`;
    h+=`<div class="freq-info"><h4>${dn}</h4><p>最近沟通：${lastDate}</p><div class="freq-count" style="color:${c}">${logs.length} 次</div></div></div>`;
  });
  h+=`</div></div>`;

  // 沟通日志时间线
  h+=`<div class="log-card"><h3>📋 沟通日志</h3><div class="log-timeline">`;
  const sorted=[...COMM_LOGS].sort((a,b)=>b.date.localeCompare(a.date));
  sorted.forEach(log=>{
    h+=`<div class="log-item" style="border-left-color:${log.color}">`;
    h+=`<div class="log-date">${log.date}</div>`;
    h+=`<div class="log-dept">${log.icon} ${log.dept}</div>`;
    h+=`<div class="log-text">${log.summary}</div>`;
    if(log.next) h+=`<div class="log-next">⏭ 下一步：${log.next}</div>`;
    h+=`</div>`;
  });
  if(!sorted.length) h+=`<div class="chart-empty">暂无沟通记录</div>`;
  h+=`</div></div>`;
  w.innerHTML=h;
}

renderScale();
renderFilters('filterBar','d');
renderFilters('reqFilterBar','r');
renderCards();
renderReqs();
</script>
