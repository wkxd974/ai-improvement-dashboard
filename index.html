<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>各部门AI提效进度看板</title>
<style>
  :root {
    --bg: #f8fafc; --card: #ffffff; --primary: #2563eb; --primary-light: #dbeafe;
    --success: #059669; --success-light: #d1fae5; --warning: #d97706; --warning-light: #fef3c7;
    --danger: #dc2626; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-300: #cbd5e1;
    --gray-500: #64748b; --gray-700: #334155; --gray-900: #0f172a;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background:var(--bg); color:var(--gray-700); line-height:1.6; }

  .container { max-width:1280px; margin:0 auto; padding:24px; }

  /* Header */
  .header { text-align:center; padding:40px 0 32px; }
  .header h1 { font-size:28px; font-weight:700; color:var(--gray-900); margin-bottom:8px; }
  .header p { color:var(--gray-500); font-size:14px; }
  .header .sync-time { display:inline-flex; align-items:center; gap:6px; background:var(--primary-light); color:var(--primary); padding:4px 12px; border-radius:20px; font-size:12px; margin-top:8px; }
  .header .sync-time::before { content:''; width:6px; height:6px; background:var(--success); border-radius:50%; }

  /* Stats Row */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px; }
  .stat-card { background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); text-align:center; }
  .stat-card .num { font-size:32px; font-weight:700; color:var(--primary); }
  .stat-card .label { font-size:13px; color:var(--gray-500); margin-top:4px; }

  /* Tabs */
  .tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--gray-100); padding:4px; border-radius:10px; width:fit-content; }
  .tab { padding:8px 20px; border-radius:8px; border:none; background:transparent; cursor:pointer; font-size:14px; color:var(--gray-500); font-weight:500; transition:all .2s; }
  .tab.active { background:var(--card); color:var(--primary); box-shadow:var(--shadow); }
  .tab:hover { color:var(--gray-900); }

  /* Tab Content */
  .tab-content { display:none; } .tab-content.active { display:block; }

  /* Department Cards */
  .dept-grid { display:grid; gap:20px; }
  .dept-card { background:var(--card); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); transition:box-shadow .2s; }
  .dept-card:hover { box-shadow:var(--shadow-md); }
  .dept-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .dept-name { font-size:18px; font-weight:600; color:var(--gray-900); display:flex; align-items:center; gap:8px; }
  .dept-name .icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .dept-badge { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; }
  .badge-progress { background:var(--warning-light); color:var(--warning); }
  .badge-done { background:var(--success-light); color:var(--success); }

  /* Progress Bar with Milestones */
  .progress-section { margin-bottom:12px; }
  .progress-info { display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px; color:var(--gray-500); }
  .progress-info .pct { font-weight:600; color:var(--primary); font-size:15px; }
  .progress-track { position:relative; height:10px; background:var(--gray-200); border-radius:5px; overflow:visible; }
  .progress-fill { height:100%; border-radius:5px; background:linear-gradient(90deg, #3b82f6, #2563eb); transition:width .6s ease; position:relative; z-index:1; }
  .milestones { position:relative; height:36px; margin-top:4px; }
  .milestone { position:absolute; transform:translateX(-50%); text-align:center; }
  .milestone .dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--gray-300); background:var(--card); margin:0 auto 4px; position:relative; z-index:2; }
  .milestone .dot.completed { background:var(--success); border-color:var(--success); }
  .milestone .dot.current { background:var(--warning); border-color:var(--warning); box-shadow:0 0 0 4px rgba(217,119,6,.2); }
  .milestone .name { font-size:11px; color:var(--gray-500); white-space:nowrap; }
  .milestone .dot.completed + .name { color:var(--success); }

  /* Detail Panel */
  .dept-details { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; padding-top:16px; border-top:1px solid var(--gray-200); }
  .detail-item { display:flex; align-items:center; gap:8px; font-size:13px; }
  .detail-item .label { color:var(--gray-500); }
  .detail-item .value { color:var(--gray-700); font-weight:500; }

  /* Expand Button */
  .expand-btn { width:100%; padding:8px; border:none; background:var(--gray-100); border-radius:8px; cursor:pointer; font-size:13px; color:var(--gray-500); margin-top:12px; transition:background .2s; }
  .expand-btn:hover { background:var(--gray-200); }

  /* Sub-stage detail panel */
  .stage-detail-panel { display:none; margin-top:12px; }
  .stage-detail-panel.show { display:block; }

  .stage-group { margin-bottom:16px; border:1px solid var(--gray-200); border-radius:10px; overflow:hidden; }
  .stage-group-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:var(--gray-100); cursor:pointer; user-select:none; }
  .stage-group-header:hover { background:var(--gray-200); }
  .stage-group-title { font-size:14px; font-weight:600; color:var(--gray-900); display:flex; align-items:center; gap:8px; }
  .stage-group-title .stage-num { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:6px; background:var(--primary); color:#fff; font-size:11px; font-weight:700; }
  .stage-group-status { font-size:12px; }
  .stage-group-body { padding:0; }

  .sub-step { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid var(--gray-100); transition:background .2s; }
  .sub-step:last-child { border-bottom:none; }
  .sub-step:hover { background:#fafbfd; }

  .sub-step-check { width:20px; height:20px; border-radius:50%; border:2px solid var(--gray-300); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; }
  .sub-step-check.done { background:var(--success); border-color:var(--success); color:#fff; }
  .sub-step-check.wip { background:var(--warning); border-color:var(--warning); color:#fff; }

  .sub-step-info { flex:1; min-width:0; }
  .sub-step-name { font-size:13px; font-weight:500; color:var(--gray-900); }
  .sub-step-desc { font-size:11px; color:var(--gray-500); margin-top:2px; }

  .sub-step-meta { display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .sub-step-status { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:500; }

  /* Mini progress for stage group */
  .stage-mini-progress { display:flex; gap:3px; align-items:center; }
  .stage-mini-dot { width:8px; height:8px; border-radius:50%; background:var(--gray-200); }
  .stage-mini-dot.done { background:var(--success); }
  .stage-mini-dot.wip { background:var(--warning); }

  .status-tag { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:500; }
  .status-done { background:var(--success-light); color:var(--success); }
  .status-wip { background:var(--warning-light); color:var(--warning); }
  .status-todo { background:var(--gray-100); color:var(--gray-500); }

  /* Guide Cards */
  .guide-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px,1fr)); gap:16px; }
  .guide-card { background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); border-left:4px solid var(--primary); }
  .guide-card h4 { font-size:15px; color:var(--gray-900); margin-bottom:8px; }
  .guide-card .tool-name { font-size:13px; color:var(--primary); font-weight:600; margin-bottom:6px; }
  .guide-card .scene { font-size:13px; color:var(--gray-500); margin-bottom:8px; }
  .guide-card .efficiency { display:inline-flex; align-items:center; gap:4px; background:var(--success-light); color:var(--success); padding:2px 10px; border-radius:12px; font-size:12px; font-weight:500; }

  /* Log */
  .log-list { display:flex; flex-direction:column; gap:12px; }
  .log-item { background:var(--card); border-radius:var(--radius); padding:16px 20px; box-shadow:var(--shadow); display:flex; gap:16px; align-items:flex-start; }
  .log-date { min-width:90px; font-size:13px; color:var(--gray-500); font-weight:500; }
  .log-dept-tag { padding:2px 10px; border-radius:12px; font-size:11px; font-weight:500; background:var(--primary-light); color:var(--primary); min-width:56px; text-align:center; }
  .log-content { flex:1; font-size:14px; color:var(--gray-700); }
  .log-author { font-size:12px; color:var(--gray-500); min-width:50px; text-align:right; }

  /* Responsive */
  @media (max-width:768px) {
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .dept-details { grid-template-columns:1fr; }
    .guide-grid { grid-template-columns:1fr; }
    .header h1 { font-size:22px; }
  }

  /* Loading */
  .loading { text-align:center; padding:60px; color:var(--gray-500); }
  .loading .spinner { width:40px; height:40px; border:3px solid var(--gray-200); border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Filter */
  .filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .filter-chip { padding:6px 14px; border-radius:20px; border:1px solid var(--gray-200); background:var(--card); cursor:pointer; font-size:13px; color:var(--gray-500); transition:all .2s; }
  .filter-chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }
  .filter-chip:hover { border-color:var(--primary); color:var(--primary); }
  .filter-chip.active:hover { color:#fff; }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1 id="boardTitle">各部门AI提效进度看板</h1>
    <p id="companyName">加载中...</p>
    <div class="sync-time">最近同步: <span id="syncTime">--</span></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="num" id="statDepts">-</div><div class="label">参与部门</div></div>
    <div class="stat-card"><div class="num" id="statAvg">-</div><div class="label">平均进度</div></div>
    <div class="stat-card"><div class="num" id="statSubComplete">-</div><div class="label">已完成子步骤</div></div>
    <div class="stat-card"><div class="num" id="statTools">-</div><div class="label">推荐AI工具</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="progress">进度总览</button>
    <button class="tab" data-tab="guides">AI手册与建议</button>
    <button class="tab" data-tab="logs">更新日志</button>
  </div>

  <!-- Tab: Progress -->
  <div class="tab-content active" id="tab-progress">
    <div class="filter-bar" id="deptFilter"></div>
    <div class="dept-grid" id="deptGrid">
      <div class="loading"><div class="spinner"></div>加载数据中...</div>
    </div>
  </div>

  <!-- Tab: Guides -->
  <div class="tab-content" id="tab-guides">
    <div class="filter-bar" id="guideFilter"></div>
    <div class="guide-grid" id="guideGrid"></div>
  </div>

  <!-- Tab: Logs -->
  <div class="tab-content" id="tab-logs">
    <div class="log-list" id="logList"></div>
  </div>
</div>

<script>
const DEPT_ICONS = {
  '市场部':'📢','销售部':'💰','技术部':'💻','人事部':'👥','财务部':'📊',
  '运营部':'⚙️','客服部':'🎧','产品部':'🎯','研发部':'🔬','设计部':'🎨',
  '法务部':'⚖️','行政部':'🏢','采购部':'📦','质量部':'✅','商业分析部':'📋'
};
const DEPT_COLORS = ['#2563eb','#059669','#7c3aed','#dc2626','#d97706','#0891b2','#be185d','#4f46e5','#15803d','#c2410c'];

let DATA = null;

async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    DATA = await res.json();
    render();
  } catch(e) {
    console.warn('Failed to load data.json, using demo data');
    DATA = getDemoData();
    render();
  }
}

function getDemoData() {
  return {
    config: { company: '我的公司', title: '各部门AI提效进度看板', syncTime: new Date().toISOString(),
      stages: ['需求调研','模型选择与提示词学习','自动化工作流学习','全面应用','持续优化'] },
    departments: [
      { name:'商业分析部', stage:'模型选择与提示词学习', progress:35, stages:{'需求调研':'已完成','模型选择与提示词学习':'进行中','自动化工作流学习':'未开始','全面应用':'未开始','持续优化':'未开始'}, owner:'张三', updated:'2026-03-30', note:'正在学习提示词技巧' },
      { name:'市场部', stage:'需求调研', progress:10, stages:{'需求调研':'进行中','模型选择与提示词学习':'未开始','自动化工作流学习':'未开始','全面应用':'未开始','持续优化':'未开始'}, owner:'李四', updated:'2026-03-28', note:'部门需求收集中' }
    ],
    subStages: [
      { stageId:'阶段1', stageName:'需求调研', subName:'部门需求收集', description:'与部门沟通，收集现有痛点和业务需求' },
      { stageId:'阶段1', stageName:'需求调研', subName:'AI场景挖掘', description:'主动为部门识别可用AI赋能的新场景' },
      { stageId:'阶段2', stageName:'模型选择与提示词学习', subName:'模型选型', description:'确定适合业务的AI模型与工具' },
      { stageId:'阶段2', stageName:'模型选择与提示词学习', subName:'提示词入门', description:'学习基础提示词写法、常用模板' },
      { stageId:'阶段2', stageName:'模型选择与提示词学习', subName:'提示词进阶', description:'掌握角色设定、Few-shot、思维链等高级技巧' },
      { stageId:'阶段3', stageName:'自动化工作流学习', subName:'单步自动化', description:'单一AI工具完成独立任务（如AI写邮件、整理数据）' },
      { stageId:'阶段3', stageName:'自动化工作流学习', subName:'多步工作流', description:'串联多步骤自动化（如数据采集→分析→生成报告）' },
      { stageId:'阶段3', stageName:'自动化工作流学习', subName:'系统集成', description:'与现有业务系统对接，实现端到端自动化' },
      { stageId:'阶段4', stageName:'全面应用', subName:'业务全覆盖', description:'AI工具融入日常核心业务流程' },
      { stageId:'阶段4', stageName:'全面应用', subName:'智能体应用', description:'使用AI Agent（GPTs、Claude、Coze等）处理复杂任务' },
      { stageId:'阶段5', stageName:'持续优化', subName:'效果评估', description:'量化AI提效成果，收集使用反馈' },
      { stageId:'阶段5', stageName:'持续优化', subName:'迭代优化', description:'优化提示词与工作流，沉淀最佳实践' }
    ],
    subStageProgress: [],
    milestones: [],
    guides: [],
    logs: []
  };
}

function render() {
  if (!DATA) return;
  const { config, departments, guides, logs, subStages, subStageProgress } = DATA;
  const stages = config.stages || ['需求调研','模型选择与提示词学习','自动化工作流学习','全面应用','持续优化'];

  // Header
  document.getElementById('boardTitle').textContent = config.title || '各部门AI提效进度看板';
  document.getElementById('companyName').textContent = config.company || '';
  document.getElementById('syncTime').textContent = config.syncTime ? new Date(config.syncTime).toLocaleString('zh-CN') : '--';

  // Stats
  document.getElementById('statDepts').textContent = departments.length;
  const avg = departments.length ? departments.reduce((s,d) => s + d.progress, 0) / departments.length : 0;
  document.getElementById('statAvg').textContent = Math.round(avg) + '%';

  // Count completed sub-steps
  let subComplete = 0;
  if (subStageProgress && subStageProgress.length) {
    subStageProgress.forEach(sp => { if(sp.status === '已完成') subComplete++; });
  } else {
    // Fallback: count from main stages
    departments.forEach(d => { Object.values(d.stages||{}).forEach(v => { if(v==='已完成') subComplete++; }); });
  }
  document.getElementById('statSubComplete').textContent = subComplete;

  const toolSet = new Set();
  (guides||[]).forEach(g => toolSet.add(g.tool));
  document.getElementById('statTools').textContent = toolSet.size;

  // Build sub-stage lookup: { dept: { stageName: [ {subName, status, desc, ...} ] } }
  const subLookup = {};
  if (subStages && subStages.length) {
    // First build definitions
    const defs = {};
    subStages.forEach(ss => {
      if (!defs[ss.stageName]) defs[ss.stageName] = [];
      defs[ss.stageName].push({ subName: ss.subName, description: ss.description });
    });

    // Then overlay progress data
    departments.forEach(dept => {
      subLookup[dept.name] = {};
      Object.keys(defs).forEach(stageName => {
        subLookup[dept.name][stageName] = defs[stageName].map(d => {
          // Find matching progress entry
          const prog = (subStageProgress||[]).find(p =>
            p.dept === dept.name && p.stageName === stageName && p.subName === d.subName
          );
          return {
            subName: d.subName,
            description: d.description,
            status: prog ? prog.status : '未开始',
            completedDate: prog ? prog.completedDate : '',
            owner: prog ? prog.owner : '',
            note: prog ? prog.note : ''
          };
        });
      });
    });
  }

  // Dept filter
  const deptNames = departments.map(d => d.name);
  renderFilter('deptFilter', deptNames, (sel) => renderDepts(departments, stages, sel, subLookup));
  renderFilter('guideFilter', [...new Set((guides||[]).map(g => g.dept))], (sel) => renderGuides(guides||[], sel));

  renderDepts(departments, stages, null, subLookup);
  renderGuides(guides||[], null);
  renderLogs(logs||[]);
}

function renderFilter(containerId, items, onChange) {
  const el = document.getElementById(containerId);
  el.innerHTML = '<button class="filter-chip active" data-dept="all">全部</button>' +
    items.map(n => `<button class="filter-chip" data-dept="${n}">${n}</button>`).join('');
  el.querySelectorAll('.filter-chip').forEach(btn => {
    btn.onclick = () => {
      el.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onChange(btn.dataset.dept === 'all' ? null : btn.dataset.dept);
    };
  });
}

function renderDepts(departments, stages, filter, subLookup) {
  const grid = document.getElementById('deptGrid');
  const depts = filter ? departments.filter(d => d.name === filter) : departments;
  grid.innerHTML = depts.map((dept, i) => {
    const color = DEPT_COLORS[i % DEPT_COLORS.length];
    const icon = DEPT_ICONS[dept.name] || '📋';

    // Main milestone dots
    const msHtml = stages.map((s, si) => {
      const pct = ((si + 1) / stages.length * 100).toFixed(1);
      const stageKey = Object.keys(dept.stages||{}).find(k => k === s || k.includes(s) || s.includes(k));
      const status = stageKey ? dept.stages[stageKey] : '未开始';
      const dotClass = status === '已完成' ? 'completed' : status === '进行中' ? 'current' : '';
      return `<div class="milestone" style="left:${pct}%"><div class="dot ${dotClass}"></div><div class="name">${s}</div></div>`;
    }).join('');

    // Sub-stage detail groups
    const deptSubs = subLookup[dept.name] || {};
    const stageGroupsHtml = stages.map((stageName, si) => {
      const subs = deptSubs[stageName] || [];
      if (!subs.length) {
        // No sub-stages defined, show simple row
        const stageKey = Object.keys(dept.stages||{}).find(k => k === stageName || k.includes(stageName) || stageName.includes(k));
        const st = stageKey ? dept.stages[stageKey] : '未开始';
        const cls = st === '已完成' ? 'status-done' : st === '进行中' ? 'status-wip' : 'status-todo';
        return `<div class="stage-group">
          <div class="stage-group-header">
            <div class="stage-group-title"><span class="stage-num">${si+1}</span>${stageName}</div>
            <span class="status-tag ${cls}">${st}</span>
          </div>
        </div>`;
      }

      // Mini dots for stage header
      const miniDots = subs.map(sub => {
        const dc = sub.status === '已完成' ? 'done' : sub.status === '进行中' ? 'wip' : '';
        return `<div class="stage-mini-dot ${dc}"></div>`;
      }).join('');

      // Count completed
      const doneCount = subs.filter(s => s.status === '已完成').length;
      const stageKey = Object.keys(dept.stages||{}).find(k => k === stageName || k.includes(stageName) || stageName.includes(k));
      const stageSt = stageKey ? dept.stages[stageKey] : '未开始';
      const cls = stageSt === '已完成' ? 'status-done' : stageSt === '进行中' ? 'status-wip' : 'status-todo';

      const subsHtml = subs.map(sub => {
        const checkClass = sub.status === '已完成' ? 'done' : sub.status === '进行中' ? 'wip' : '';
        const checkIcon = sub.status === '已完成' ? '✓' : sub.status === '进行中' ? '◐' : '';
        const stCls = sub.status === '已完成' ? 'status-done' : sub.status === '进行中' ? 'status-wip' : 'status-todo';
        return `<div class="sub-step">
          <div class="sub-step-check ${checkClass}">${checkIcon}</div>
          <div class="sub-step-info">
            <div class="sub-step-name">${sub.subName}</div>
            <div class="sub-step-desc">${sub.description}</div>
          </div>
          <div class="sub-step-meta">
            <span class="sub-step-status ${stCls}">${sub.status}</span>
          </div>
        </div>`;
      }).join('');

      return `<div class="stage-group">
        <div class="stage-group-header" onclick="this.parentElement.querySelector('.stage-group-body').classList.toggle('show');this.parentElement.classList.toggle('expanded')">
          <div class="stage-group-title">
            <span class="stage-num">${si+1}</span>${stageName}
            <span style="font-size:11px;color:var(--gray-500);font-weight:400;margin-left:4px">(${doneCount}/${subs.length})</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="stage-mini-progress">${miniDots}</div>
            <span class="status-tag ${cls}">${stageSt}</span>
          </div>
        </div>
        <div class="stage-group-body" style="display:none">${subsHtml}</div>
      </div>`;
    }).join('');

    return `
    <div class="dept-card">
      <div class="dept-header">
        <div class="dept-name">
          <div class="icon" style="background:${color}15;color:${color}">${icon}</div>
          ${dept.name}
        </div>
        <span class="dept-badge ${dept.progress >= 100 ? 'badge-done' : 'badge-progress'}">${dept.stage}</span>
      </div>
      <div class="progress-section">
        <div class="progress-info"><span>总进度</span><span class="pct">${dept.progress}%</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${dept.progress}%;background:linear-gradient(90deg,${color}88,${color})"></div></div>
        <div class="milestones">${msHtml}</div>
      </div>
      <div class="dept-details">
        <div class="detail-item"><span class="label">负责人:</span><span class="value">${dept.owner||'--'}</span></div>
        <div class="detail-item"><span class="label">更新日期:</span><span class="value">${dept.updated||'--'}</span></div>
        <div class="detail-item" style="grid-column:1/-1"><span class="label">当前情况:</span><span class="value">${dept.note||'--'}</span></div>
      </div>
      <button class="expand-btn" onclick="toggleDetail(this)">展开阶段详情 ▼</button>
      <div class="stage-detail-panel">${stageGroupsHtml}</div>
    </div>`;
  }).join('');

  // Initialize stage-group-body toggle via CSS
  document.querySelectorAll('.stage-group-header').forEach(h => {
    h.style.cursor = 'pointer';
  });
}

function toggleDetail(btn) {
  const panel = btn.nextElementSibling;
  const show = !panel.classList.contains('show');
  panel.classList.toggle('show');
  btn.textContent = show ? '收起阶段详情 ▲' : '展开阶段详情 ▼';
}

// Toggle stage group body
document.addEventListener('click', function(e) {
  const header = e.target.closest('.stage-group-header');
  if (!header) return;
  const body = header.nextElementSibling;
  if (!body) return;
  const isShown = body.style.display !== 'none';
  body.style.display = isShown ? 'none' : 'block';
});

function renderGuides(guides, filter) {
  const grid = document.getElementById('guideGrid');
  const items = filter ? guides.filter(g => g.dept === filter) : guides;
  grid.innerHTML = items.length ? items.map(g => `
    <div class="guide-card">
      <h4>${g.dept}</h4>
      <div class="tool-name">${g.tool}</div>
      <div class="scene">${g.scene}</div>
      ${g.efficiency ? `<div class="efficiency">效率提升预估 ${g.efficiency}</div>` : ''}
      <p style="margin-top:8px;font-size:12px;color:var(--gray-500)">${g.note||''}</p>
    </div>
  `).join('') : '<div style="text-align:center;color:var(--gray-500);padding:40px">暂无AI手册与建议数据</div>';
}

function renderLogs(logs) {
  const list = document.getElementById('logList');
  list.innerHTML = logs.length ? logs.map(l => `
    <div class="log-item">
      <div class="log-date">${l.date}</div>
      <div class="log-dept-tag">${l.dept}</div>
      <div class="log-content">${l.content}</div>
      <div class="log-author">${l.author||''}</div>
    </div>
  `).join('') : '<div style="text-align:center;color:var(--gray-500);padding:40px">暂无更新日志</div>';
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  };
});

// Init
loadData();
</script>
</body>
</html>
