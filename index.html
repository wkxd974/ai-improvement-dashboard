<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>各部门AI使用能力诊断看板</title>
<style>
  :root {
    --bg: #f8fafc; --card: #ffffff; --primary: #2563eb; --primary-light: #dbeafe;
    --success: #059669; --success-light: #d1fae5; --warning: #d97706; --warning-light: #fef3c7;
    --danger: #dc2626; --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
    --gray-300: #cbd5e1; --gray-400: #94a3b8; --gray-500: #64748b; --gray-600: #475569;
    --gray-700: #334155; --gray-800: #1e293b; --gray-900: #0f172a;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
    --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background:var(--bg); color:var(--gray-700); line-height:1.6; }
  .container { max-width:1100px; margin:0 auto; padding:24px; }

  /* Header */
  .header { text-align:center; padding:40px 0 24px; }
  .header h1 { font-size:26px; font-weight:700; color:var(--gray-900); margin-bottom:6px; letter-spacing:-.5px; }
  .header p { color:var(--gray-500); font-size:14px; }
  .header .meta { display:inline-flex; align-items:center; gap:6px; background:var(--gray-100); color:var(--gray-500); padding:4px 14px; border-radius:20px; font-size:12px; margin-top:10px; }

  /* Tabs */
  .tabs { display:flex; gap:4px; margin-bottom:28px; background:var(--gray-100); padding:4px; border-radius:10px; width:fit-content; }
  .tab { padding:8px 22px; border-radius:8px; border:none; background:transparent; cursor:pointer; font-size:14px; color:var(--gray-500); font-weight:500; transition:all .2s; }
  .tab.active { background:var(--card); color:var(--primary); box-shadow:var(--shadow); }
  .tab:hover { color:var(--gray-900); }
  .tab-content { display:none; } .tab-content.active { display:block; }

  /* ===== Scale Bar ===== */
  .scale-bar-wrap { background:var(--card); border-radius:var(--radius); padding:24px 28px 20px; box-shadow:var(--shadow); margin-bottom:28px; }
  .scale-bar-wrap h3 { font-size:15px; font-weight:600; color:var(--gray-800); margin-bottom:16px; }
  .scale-bar { display:flex; gap:2px; height:36px; border-radius:8px; overflow:hidden; }
  .scale-seg { flex:1; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:600; cursor:pointer; transition:filter .15s,transform .15s; position:relative; }
  .scale-seg:hover { filter:brightness(1.15); transform:scaleY(1.12); z-index:1; }
  .scale-labels { display:flex; gap:2px; margin-top:4px; }
  .scale-labels span { flex:1; text-align:center; font-size:10px; color:var(--gray-400); }

  /* Reference Band */
  .ref-band { margin-top:18px; padding:16px 0 0; border-top:1px solid var(--gray-100); }
  .ref-title { font-size:13px; color:var(--gray-500); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .ref-bar-wrap { position:relative; height:28px; background:var(--gray-100); border-radius:6px; overflow:visible; }
  .ref-range { position:absolute; top:0; height:100%; border-radius:6px; opacity:.25; }
  .ref-marker { position:absolute; top:-4px; width:3px; height:36px; border-radius:2px; z-index:2; }
  .ref-marker-label { position:absolute; top:-22px; font-size:10px; font-weight:600; white-space:nowrap; transform:translateX(-50%); }
  .ref-legend { display:flex; gap:20px; margin-top:10px; font-size:12px; color:var(--gray-500); }

  /* ===== Department Cards ===== */
  .dept-grid { display:grid; gap:20px; }
  .dept-card { background:var(--card); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); transition:box-shadow .2s; }
  .dept-card:hover { box-shadow:var(--shadow-md); }
  .dept-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .dept-name { display:flex; align-items:center; gap:10px; }
  .dept-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .dept-name h3 { font-size:17px; font-weight:600; color:var(--gray-900); }
  .score-badge { font-size:28px; font-weight:700; letter-spacing:-1px; }
  .score-sub { font-size:12px; font-weight:400; color:var(--gray-400); margin-left:2px; }

  /* Score Bar */
  .score-bar-wrap { margin-bottom:14px; }
  .score-bar-bg { height:12px; background:var(--gray-100); border-radius:6px; overflow:hidden; position:relative; }
  .score-bar-fill { height:100%; border-radius:6px; transition:width .6s ease; }
  .score-bar-labels { display:flex; justify-content:space-between; margin-top:4px; font-size:11px; color:var(--gray-400); }

  /* Level tag */
  .level-tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:500; }

  /* Evidence */
  .evidence { margin-top:12px; }
  .evidence-title { font-size:12px; color:var(--gray-400); margin-bottom:6px; display:flex; align-items:center; gap:4px; cursor:pointer; user-select:none; }
  .evidence-title::before { content:'▸'; font-size:10px; transition:transform .2s; display:inline-block; }
  .evidence-title.open::before { transform:rotate(90deg); }
  .evidence-list { display:none; padding-left:16px; }
  .evidence-list.open { display:block; }
  .evidence-list li { font-size:13px; color:var(--gray-600); margin-bottom:4px; list-style:none; position:relative; padding-left:12px; }
  .evidence-list li::before { content:'·'; position:absolute; left:0; color:var(--gray-300); font-weight:bold; }

  /* Teams sub-rows */
  .teams-wrap { margin-top:14px; padding-top:12px; border-top:1px dashed var(--gray-200); }
  .teams-title { font-size:12px; color:var(--gray-400); margin-bottom:8px; }
  .team-row { display:flex; align-items:center; gap:12px; padding:6px 0; }
  .team-name { font-size:13px; color:var(--gray-600); min-width:80px; }
  .team-bar-bg { flex:1; height:8px; background:var(--gray-100); border-radius:4px; overflow:hidden; }
  .team-bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }
  .team-score { font-size:13px; font-weight:600; min-width:28px; text-align:right; }

  /* ===== Scale Detail ===== */
  .scale-detail { display:grid; gap:12px; }
  .scale-item { display:flex; align-items:stretch; gap:14px; background:var(--card); border-radius:var(--radius); padding:16px 20px; box-shadow:var(--shadow); }
  .scale-num { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; font-weight:700; flex-shrink:0; }
  .scale-info h4 { font-size:15px; font-weight:600; color:var(--gray-800); margin-bottom:2px; }
  .scale-info p { font-size:13px; color:var(--gray-500); }

  /* ===== Roadmap (提升路径 Tab) ===== */
  .roadmap-dept { background:var(--card); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); margin-bottom:20px; }
  .roadmap-dept-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .roadmap-dept-header .dept-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .roadmap-dept-header h3 { font-size:16px; font-weight:600; color:var(--gray-900); }
  .roadmap-dept-header .target-tag { font-size:12px; padding:3px 10px; border-radius:20px; font-weight:500; margin-left:auto; }

  /* Journey bar */
  .journey-bar { position:relative; display:flex; align-items:center; margin:0 0 20px; padding:0 4px; }
  .journey-track { flex:1; height:6px; background:var(--gray-200); border-radius:3px; position:relative; }
  .journey-fill { height:100%; border-radius:3px; position:absolute; left:0; top:0; }
  .journey-target-fill { height:100%; border-radius:3px; position:absolute; top:0; opacity:.18; }
  .journey-dot { width:14px; height:14px; border-radius:50%; border:3px solid #fff; position:absolute; top:50%; transform:translate(-50%,-50%); z-index:2; box-shadow:0 1px 4px rgba(0,0,0,.15); }
  .journey-label { position:absolute; top:14px; transform:translateX(-50%); font-size:10px; font-weight:600; white-space:nowrap; }
  .journey-end-labels { display:flex; justify-content:space-between; margin-top:2px; font-size:10px; color:var(--gray-400); padding:0 4px; }

  /* Milestones */
  .milestones { display:grid; gap:0; position:relative; padding-left:20px; }
  .milestone { position:relative; padding:0 0 18px 20px; }
  .milestone:last-child { padding-bottom:0; }
  .milestone::before { content:''; position:absolute; left:-20px; top:7px; bottom:-4px; width:2px; background:var(--gray-200); }
  .milestone:last-child::before { display:none; }
  .milestone-dot { width:12px; height:12px; border-radius:50%; position:absolute; left:-25px; top:5px; z-index:1; border:2px solid #fff; box-shadow:0 0 0 2px var(--gray-200); }
  .milestone-dot.reached { box-shadow:0 0 0 2px var(--success); }
  .milestone-dot.current { box-shadow:0 0 0 2px var(--primary); animation:pulse 2s infinite; }
  .milestone-dot.future { opacity:.6; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 2px var(--primary);} 50%{box-shadow:0 0 0 4px rgba(37,99,235,.25);} }
  .milestone-level { font-size:11px; font-weight:600; color:var(--gray-400); margin-bottom:2px; }
  .milestone-title { font-size:14px; font-weight:600; color:var(--gray-800); margin-bottom:4px; }
  .milestone-desc { font-size:12px; color:var(--gray-500); margin-bottom:6px; }

  /* Actions inside milestones */
  .ms-actions { display:flex; flex-direction:column; gap:4px; }
  .ms-action { display:flex; align-items:flex-start; gap:6px; font-size:12px; color:var(--gray-600); padding:3px 8px; background:var(--gray-50); border-radius:6px; border-left:3px solid var(--gray-200); }
  .ms-action.generic { border-left-color:var(--primary); color:var(--gray-500); }
  .ms-action.specific { border-left-color:var(--success); }
  .ms-action-tag { font-size:10px; font-weight:600; padding:1px 6px; border-radius:4px; white-space:nowrap; flex-shrink:0; margin-top:1px; }
  .ms-action-tag.g { background:var(--primary-light); color:var(--primary); }
  .ms-action-tag.s { background:var(--success-light); color:var(--success); }

  /* Requirements */
  .dept-reqs { margin-top:16px; padding-top:14px; border-top:1px solid var(--gray-100); }
  .dept-reqs-title { font-size:13px; font-weight:600; color:var(--gray-700); margin-bottom:10px; display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; }
  .dept-reqs-title::before { content:'▸'; font-size:10px; transition:transform .2s; display:inline-block; }
  .dept-reqs-title.open::before { transform:rotate(90deg); }
  .dept-reqs-list { display:none; }
  .dept-reqs-list.open { display:block; }
  .req-card { display:flex; gap:10px; padding:10px 12px; background:var(--gray-50); border-radius:8px; margin-bottom:8px; }
  .req-card:last-child { margin-bottom:0; }
  .req-pri { font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; white-space:nowrap; height:fit-content; margin-top:2px; }
  .req-pri.high { background:#fef2f2; color:#dc2626; }
  .req-pri.mid { background:#fef3c7; color:#d97706; }
  .req-pri.low { background:#f0fdf4; color:#059669; }
  .req-body h5 { font-size:13px; font-weight:600; color:var(--gray-800); margin-bottom:2px; }
  .req-body p { font-size:12px; color:var(--gray-500); }
  .req-ai-note { font-size:11px; color:var(--primary); margin-top:4px; padding:3px 8px; background:var(--primary-light); border-radius:4px; display:inline-block; }

  /* Tooltip */
  .tooltip { position:absolute; background:var(--gray-800); color:#fff; padding:8px 12px; border-radius:8px; font-size:12px; line-height:1.5; z-index:100; pointer-events:none; white-space:nowrap; box-shadow:var(--shadow-lg); }
  .tooltip::after { content:''; position:absolute; bottom:-5px; left:50%; transform:translateX(-50%); border-left:5px solid transparent; border-right:5px solid transparent; border-top:5px solid var(--gray-800); }

  @media(max-width:640px){
    .container { padding:16px; }
    .header h1 { font-size:22px; }
    .dept-card, .roadmap-dept { padding:16px; }
    .scale-seg { font-size:9px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>各部门 AI 使用能力诊断</h1>
    <p>商业分析部 · 基于部门访谈与实际工作场景评估</p>
    <div class="meta">📋 诊断日期：2025年3月</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('diag')">能力诊断</button>
    <button class="tab" onclick="switchTab('road')">提升路径</button>
    <button class="tab" onclick="switchTab('scale')">评分体系</button>
  </div>

  <div id="tab-diag" class="tab-content active">
    <div class="scale-bar-wrap" id="scaleBarWrap"></div>
    <div class="dept-grid" id="deptGrid"></div>
  </div>

  <div id="tab-road" class="tab-content">
    <div id="roadmapWrap"></div>
  </div>

  <div id="tab-scale" class="tab-content">
    <div class="scale-detail" id="scaleDetail"></div>
  </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
// ============ DATA ============

const LEVELS = [
  { level:0,  name:'零基础',       desc:'完全不使用任何AI工具', color:'#94a3b8' },
  { level:1,  name:'入门聊天',     desc:'使用飞书内置豆包，仅限基础聊天问答', color:'#64748b' },
  { level:2,  name:'国产大模型对话', desc:'使用Kimi/DeepSeek等国产大模型进行对话交流', color:'#0891b2' },
  { level:3,  name:'国际大模型对话', desc:'使用GPT/Claude等国外大模型进行对话交流', color:'#2563eb' },
  { level:4,  name:'国产AI介入工作', desc:'用国产大模型辅助创建文档、修改内容、撰写报告等工作任务', color:'#7c3aed' },
  { level:5,  name:'国际AI介入工作', desc:'用GPT/Claude等进行文件处理、文件生成、分析报告撰写', color:'#9333ea' },
  { level:6,  name:'深度数据分析',   desc:'用AI进行深度数据清洗、处理、统计分析、建模、交叉验证', color:'#c026d3' },
  { level:7,  name:'AI辅助编程',     desc:'让AI编写Python/SQL/VBA脚本，搭建数据管道，生成复杂公式逻辑', color:'#db2777' },
  { level:8,  name:'自动化工作流',   desc:'搭建定时自动化任务：API对接、定时取数推送、飞书机器人、工作流编排', color:'#e11d48' },
  { level:9,  name:'多模态与智能体', desc:'AI操控电脑执行复杂任务、图像/视频生成处理、多Agent协作、复杂决策链', color:'#dc2626' },
  { level:10, name:'全流程深度集成', desc:'AI贯穿全业务链：数据采集→清洗→分析→决策→执行→监控，全自动闭环', color:'#b91c1c' },
];

const REF = { name:'商业分析部', upper:9, lower:6, avg:null };

const DEPARTMENTS = [
  {
    name:'人事部', icon:'👥', color:'#2E75B6', score:1,
    levelName:'入门聊天',
    evidence:[
      '主要使用飞书内置豆包进行基础问答',
      '未接触过Kimi/DeepSeek等独立AI产品',
      '没有将AI应用于日常HR工作流程',
      '对AI能力边界认知有限，需要系统性引导',
    ],
    teams:null,
  },
  {
    name:'财务部', icon:'📊', color:'#548235', score:1.5,
    levelName:'入门聊天 ~ 国产对话',
    evidence:[
      '部分员工使用豆包做基础查询',
      '有个别人尝试过Kimi但未深入使用',
      '核心财务工作仍以传统Excel手工为主',
      '对AI处理敏感财务数据存在顾虑',
    ],
    teams:null,
  },
  {
    name:'市场部', icon:'📢', color:'#BF8F00', score:2.3,
    levelName:'入门聊天 ~ 国产对话',
    evidence:[
      '李妍妍团队与陈婧仪团队处于入门聊天阶段，主要使用豆包做基础问答',
      '申江团队已达到使用国外大模型处理文件的水平（Lv.5）',
      '团队间AI使用水平差异较大',
      '整体仍有大量手工操作空间可被AI替代',
    ],
    teams:[
      { name:'李妍妍团队', score:1 },
      { name:'陈婧仪团队', score:1 },
      { name:'申江团队', score:5 },
    ],
  },
];

// ============ 提升路径数据 ============

// 通用阶段性建议（每个等级升级需要做什么）
const GENERIC_STEPS = {
  '0→1': '开通飞书豆包，安排1次AI基础认知培训，让团队了解AI能做什么',
  '1→2': '引入Kimi或DeepSeek，培训基本对话技巧和提示词方法',
  '2→3': '开通GPT/Claude企业账号，对比国产与国际模型效果差异',
  '3→4': '用国产AI处理日常文档：总结会议纪要、生成报告初稿、修改文案',
  '4→5': '用GPT/Claude处理文件：数据整理、分析报告撰写、多文件汇总',
  '5→6': '学习让AI做深度数据分析：建模、交叉验证、统计检验',
  '6→7': '让AI编写Python/SQL脚本，搭建自动化数据处理管道',
  '7→8': '配置定时任务、API取数、飞书机器人推送，形成自动化工作流',
  '8→9': '引入AI Agent操控电脑、图像视频生成、多Agent协作',
  '9→10': '全业务链AI闭环：采集→清洗→分析→决策→执行→监控',
};

// 各部门提升路径（分阶段里程碑 + 个性化行动 + 部门需求）
const ROADMAPS = [
  {
    dept: '人事部',
    icon: '👥',
    color: '#2E75B6',
    currentScore: 1,
    targetScore: 5,
    targetReason: '人事部核心需求为数据报表、信息整合和模板化输出，Lv.5可覆盖绝大部分场景',
    milestones: [
      { from:1, to:2, actions:[
        '让团队试用Kimi处理简单HR咨询问题（请假政策、制度解答）',
        '用DeepSeek汇总每日常用问答，形成HR知识库初稿',
      ]},
      { from:2, to:3, actions:[
        '开通GPT企业账号（公司已有企业合作），分发给关键岗位',
        '对比豆包与GPT在文档生成（如贺卡模板）上的效果差异',
      ]},
      { from:3, to:4, actions:[
        '用Kimi/DeepSeek生成张大哥送祝福贺卡模板（换照片+姓名批量输出）',
        '用AI辅助筛选订阅号文章初稿（按字数、格式等硬指标初筛）',
      ]},
      { from:4, to:5, actions:[
        '用GPT/Claude处理人效看板日数据：门店打卡→汇总→合理值对比→预警输出',
        '用AI整合店经理全档案（从多个数据源合并，按Skill规则自动填表）',
        '建立标准化Skill文档：定义数据来源、取数字段、输出格式',
      ]},
    ],
    requirements: [
      { name:'人效看板自动化', desc:'每日从BI取门店打卡数据，自动计算人均看台、合理值对比并预警输出', priority:'high', aiNote:'需对接BI数仓接口，AI可实现全流程自动化' },
      { name:'张大哥送祝福贺卡', desc:'季度/年度批量生成数百张贺卡，仅需替换姓名和照片', priority:'high', aiNote:'模板化输出，AI一步即可完成' },
      { name:'店经理全档案更新', desc:'从PS、智能人事、OA、财务等多系统汇总，按月更新店经理全维度数据表', priority:'high', aiNote:'编写Skill规则文档，AI按规则从各数据源整合填表' },
      { name:'订阅号文章初筛', desc:'从1000+篇投稿中按规则筛选合格文章', priority:'mid', aiNote:'硬指标（字数、格式）可AI初筛，主观质量判断仍需人工' },
      { name:'大区数据保底差额', desc:'追踪门店人员数据，但部分数据不在BI上（PS等系统）', priority:'mid', aiNote:'需先推动BI接入更多数据源，再用AI处理' },
    ],
  },
  {

// ============ RENDER ============

function getColorForScore(score) {
  const idx = Math.min(Math.round(score), 10);
  return LEVELS[idx].color;
}

function renderScaleBar() {
  const wrap = document.getElementById('scaleBarWrap');
  let barHtml = '<h3>AI 使用能力等级标尺（0-10）</h3><div class="scale-bar">';
  LEVELS.forEach(lv => {
    barHtml += `<div class="scale-seg" style="background:${lv.color}" data-level="${lv.level}"
      onmouseenter="showTip(event, 'Lv.${lv.level} ${lv.name}\\n${lv.desc}')"
      onmouseleave="hideTip()">${lv.level}</div>`;
  });
  barHtml += '</div><div class="scale-labels">';
  LEVELS.forEach(lv => { barHtml += `<span>${lv.name}</span>`; });
  barHtml += '</div>';
  barHtml += renderRefBand();
  wrap.innerHTML = barHtml;
}

function renderRefBand() {
  const pct = v => (v / 10 * 100);
  const left = pct(REF.lower);
  const width = pct(REF.upper) - left;
  let html = `<div class="ref-band"><div class="ref-title">📐 ${REF.name}（参考基准带）</div>`;
  html += `<div class="ref-bar-wrap">`;
  html += `<div class="ref-range" style="left:${left}%;width:${width}%;background:linear-gradient(90deg,${LEVELS[REF.lower].color},${LEVELS[REF.upper].color})"></div>`;
  html += `<div class="ref-marker" style="left:${left}%;background:${LEVELS[REF.lower].color}"><span class="ref-marker-label" style="color:${LEVELS[REF.lower].color}">下限 Lv.${REF.lower}</span></div>`;
  html += `<div class="ref-marker" style="left:${pct(REF.upper)}%;background:${LEVELS[REF.upper].color}"><span class="ref-marker-label" style="color:${LEVELS[REF.upper].color}">上限 Lv.${REF.upper}</span></div>`;
  if (REF.avg !== null) {
    html += `<div class="ref-marker" style="left:${pct(REF.avg)}%;background:var(--primary);width:4px;"><span class="ref-marker-label" style="color:var(--primary)">均值 Lv.${REF.avg}</span></div>`;
  }
  html += `</div>`;
  html += `<div class="ref-legend">
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${LEVELS[REF.lower].color};margin-right:5px;vertical-align:middle;"></span>下限 Lv.${REF.lower}（${LEVELS[REF.lower].name}）</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${LEVELS[REF.upper].color};margin-right:5px;vertical-align:middle;"></span>上限 Lv.${REF.upper}（${LEVELS[REF.upper].name}）</span>`;
  if (REF.avg !== null) {
    html += `<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--primary);margin-right:5px;vertical-align:middle;"></span>部门均值 Lv.${REF.avg}</span>`;
  } else {
    html += `<span style="color:var(--gray-400);">均值：待评估</span>`;
  }
  html += `</div></div>`;
  return html;
}

function renderDepts() {
  const grid = document.getElementById('deptGrid');
  grid.innerHTML = DEPARTMENTS.map(dept => {
    const pct = (dept.score / 10 * 100).toFixed(1);
    const clr = getColorForScore(dept.score);
    let html = `<div class="dept-card">
      <div class="dept-header">
        <div class="dept-name">
          <div class="dept-icon" style="background:${dept.color}15;color:${dept.color}">${dept.icon}</div>
          <div>
            <h3>${dept.name}</h3>
            <span class="level-tag" style="background:${clr}18;color:${clr}">Lv.${dept.score} ${dept.levelName}</span>
          </div>
        </div>
        <div class="score-badge" style="color:${clr}">${dept.score}<span class="score-sub">/10</span></div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${clr}88,${clr})"></div></div>
        <div class="score-bar-labels"><span>0</span><span>5</span><span>10</span></div>
      </div>`;
    html += `<div class="evidence">
      <div class="evidence-title" onclick="toggleEvidence(this)">诊断依据（${dept.evidence.length}项）</div>
      <ul class="evidence-list">`;
    dept.evidence.forEach(e => { html += `<li>${e}</li>`; });
    html += `</ul></div>`;
    if (dept.teams && dept.teams.length) {
      html += `<div class="teams-wrap"><div class="teams-title">团队细分</div>`;
      dept.teams.forEach(t => {
        const tp = (t.score / 10 * 100).toFixed(1);
        const tc = getColorForScore(t.score);
        html += `<div class="team-row">
          <span class="team-name">${t.name}</span>
          <div class="team-bar-bg"><div class="team-bar-fill" style="width:${tp}%;background:${tc}"></div></div>
          <span class="team-score" style="color:${tc}">${t.score}</span>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
    return html;
  }).join('');
}

function renderScaleDetail() {
  document.getElementById('scaleDetail').innerHTML = LEVELS.map(lv => `
    <div class="scale-item">
      <div class="scale-num" style="background:${lv.color}">${lv.level}</div>
      <div class="scale-info">
        <h4>${lv.name}</h4>
        <p>${lv.desc}</p>
      </div>
    </div>
  `).join('');
}

// ===== Roadmap rendering =====
function renderRoadmaps() {
  const wrap = document.getElementById('roadmapWrap');
  wrap.innerHTML = ROADMAPS.map(rm => {
    const curClr = getColorForScore(rm.currentScore);
    const tgtClr = getColorForScore(rm.targetScore);
    const curPct = (rm.currentScore / 10 * 100).toFixed(1);
    const tgtPct = (rm.targetScore / 10 * 100).toFixed(1);

    let html = `<div class="roadmap-dept">`;
    // Header
    html += `<div class="roadmap-dept-header">
      <div class="dept-icon" style="background:${rm.color}15;color:${rm.color}">${rm.icon}</div>
      <div>
        <h3>${rm.dept}</h3>
        <span style="font-size:12px;color:var(--gray-500);">当前 Lv.${rm.currentScore} → 目标 Lv.${rm.targetScore}</span>
      </div>
      <span class="target-tag" style="background:${tgtClr}15;color:${tgtClr}">🎯 目标：Lv.${rm.targetScore} ${LEVELS[rm.targetScore].name}</span>
    </div>`;

    // Target reason
    html += `<div style="font-size:12px;color:var(--gray-500);margin-bottom:16px;padding:8px 12px;background:var(--gray-50);border-radius:8px;border-left:3px solid ${tgtClr}">
      <strong style="color:var(--gray-700)">目标设定依据：</strong>${rm.targetReason}</div>`;

    // Journey bar
    html += `<div class="journey-bar"><div class="journey-track">
      <div class="journey-target-fill" style="width:${tgtPct}%;background:${tgtClr}"></div>
      <div class="journey-fill" style="width:${curPct}%;background:linear-gradient(90deg,${curClr}88,${curClr})"></div>
      <div class="journey-dot" style="left:${curPct}%;background:${curClr}"></div>
      <div class="journey-dot" style="left:${tgtPct}%;background:${tgtClr};border-style:dashed;opacity:.7"></div>
      <span class="journey-label" style="left:${curPct}%;color:${curClr}">当前</span>
      <span class="journey-label" style="left:${tgtPct}%;color:${tgtClr}">目标</span>
    </div></div>
    <div class="journey-end-labels"><span>Lv.0</span><span>Lv.5</span><span>Lv.10</span></div>`;

    // Milestones timeline
    html += `<div style="margin-top:20px"><div style="font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:14px;">📍 分阶段里程碑</div>`;
    html += `<div class="milestones">`;
    rm.milestones.forEach((ms, mi) => {
      const fromLv = Math.floor(ms.from);
      const toLv = ms.to;
      const isReached = rm.currentScore >= toLv;
      const isCurrent = rm.currentScore >= fromLv && rm.currentScore < toLv;
      const dotClass = isReached ? 'reached' : (isCurrent ? 'current' : 'future');
      const dotColor = isReached ? 'var(--success)' : (isCurrent ? 'var(--primary)' : 'var(--gray-300)');
      const msColor = getColorForScore(toLv);
      const stepKey = `${fromLv}→${toLv}`;
      const genericStep = GENERIC_STEPS[stepKey];

      html += `<div class="milestone">
        <div class="milestone-dot ${dotClass}" style="background:${dotColor}"></div>
        <div class="milestone-level" style="color:${msColor}">`;
      if (ms.label) html += `${ms.label} · `;
      html += `Lv.${ms.from} → Lv.${ms.to}（${LEVELS[toLv].name}）</div>
        <div class="milestone-title">${isReached ? '✅ 已达成' : (isCurrent ? '🔄 当前阶段' : '⏳ 待启动')}</div>`;

      html += `<div class="ms-actions">`;
      // Generic step
      if (genericStep) {
        html += `<div class="ms-action generic"><span class="ms-action-tag g">通用</span>${genericStep}</div>`;
      }
      // Specific actions
      ms.actions.forEach(a => {
        html += `<div class="ms-action specific"><span class="ms-action-tag s">专项</span>${a}</div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;

    // Department requirements
    if (rm.requirements && rm.requirements.length) {
      html += `<div class="dept-reqs">
        <div class="dept-reqs-title" onclick="toggleEvidence(this)">📋 部门实际需求（${rm.requirements.length}项，来源：访谈会议）</div>
        <div class="dept-reqs-list">`;
      rm.requirements.forEach(req => {
        const priClass = req.priority === 'high' ? 'high' : (req.priority === 'mid' ? 'mid' : 'low');
        const priLabel = req.priority === 'high' ? '高优' : (req.priority === 'mid' ? '中优' : '低优');
        html += `<div class="req-card">
          <span class="req-pri ${priClass}">${priLabel}</span>
          <div class="req-body">
            <h5>${req.name}</h5>
            <p>${req.desc}</p>
            ${req.aiNote ? `<span class="req-ai-note">💡 ${req.aiNote}</span>` : ''}
          </div>
        </div>`;
      });
      html += `</div></div>`;
    }

    html += `</div>`;
    return html;
  }).join('');
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const tabIds = ['diag','road','scale'];
    t.classList.toggle('active', tabIds[i] === id);
  });
  ['tab-diag','tab-road','tab-scale'].forEach(tid => {
    document.getElementById(tid).classList.toggle('active', tid === 'tab-' + id);
  });
}

function toggleEvidence(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function showTip(e, text) {
  const tip = document.getElementById('tooltip');
  tip.innerHTML = text.replace(/\\n/g, '<br>');
  tip.style.display = 'block';
  const rect = e.target.getBoundingClientRect();
  tip.style.left = rect.left + rect.width / 2 - tip.offsetWidth / 2 + 'px';
  tip.style.top = rect.top - tip.offsetHeight - 10 + window.scrollY + 'px';
}
function hideTip() { document.getElementById('tooltip').style.display = 'none'; }

// Init
renderScaleBar();
renderDepts();
renderScaleDetail();
renderRoadmaps();
</script>
