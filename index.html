<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>各部门AI提效进度看板</title>
<style>
  :root {
    --bg: #f8fafc; --card: #ffffff; --primary: #2563eb; --primary-light: #dbeafe;
    --success: #059669; --success-light: #d1fae5; --warning: #d97706; --warning-light: #fef3c7;
    --danger: #dc2626; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-300: #cbd5e1;
    --gray-500: #64748b; --gray-700: #334155; --gray-900: #0f172a;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background:var(--bg); color:var(--gray-700); line-height:1.6; }
  .container { max-width:1280px; margin:0 auto; padding:24px; }

  /* Header */
  .header { text-align:center; padding:40px 0 32px; position:relative; }
  .header h1 { font-size:28px; font-weight:700; color:var(--gray-900); margin-bottom:8px; }
  .header p { color:var(--gray-500); font-size:14px; }
  .header .sync-time { display:inline-flex; align-items:center; gap:6px; background:var(--primary-light); color:var(--primary); padding:4px 12px; border-radius:20px; font-size:12px; margin-top:8px; }
  .header .sync-time::before { content:''; width:6px; height:6px; background:var(--success); border-radius:50%; }

  /* Admin button */
  .admin-btn { position:absolute; right:0; top:40px; padding:6px 14px; border-radius:20px; border:1px solid var(--gray-200); background:var(--card); cursor:pointer; font-size:12px; color:var(--gray-500); display:flex; align-items:center; gap:5px; transition:all .2s; }
  .admin-btn:hover { border-color:var(--primary); color:var(--primary); }
  .admin-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

  /* Stats Row */
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:32px; }
  .stat-card { background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); text-align:center; }
  .stat-card .num { font-size:32px; font-weight:700; color:var(--primary); }
  .stat-card .label { font-size:13px; color:var(--gray-500); margin-top:4px; }

  /* Tabs */
  .tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--gray-100); padding:4px; border-radius:10px; width:fit-content; }
  .tab { padding:8px 20px; border-radius:8px; border:none; background:transparent; cursor:pointer; font-size:14px; color:var(--gray-500); font-weight:500; transition:all .2s; }
  .tab.active { background:var(--card); color:var(--primary); box-shadow:var(--shadow); }
  .tab:hover { color:var(--gray-900); }
  .tab-content { display:none; } .tab-content.active { display:block; }

  /* Department Cards */
  .dept-grid { display:grid; gap:20px; }
  .dept-card { background:var(--card); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); transition:box-shadow .2s; }
  .dept-card:hover { box-shadow:var(--shadow-md); }
  .dept-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .dept-name { font-size:18px; font-weight:600; color:var(--gray-900); display:flex; align-items:center; gap:8px; }
  .dept-name .icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .dept-badge { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; }
  .badge-progress { background:var(--warning-light); color:var(--warning); }
  .badge-done { background:var(--success-light); color:var(--success); }

  /* Progress Bar with Milestones */
  .progress-section { margin-bottom:12px; }
  .progress-info { display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px; color:var(--gray-500); }
  .progress-info .pct { font-weight:600; color:var(--primary); font-size:15px; }
  .progress-track { position:relative; height:10px; background:var(--gray-200); border-radius:5px; overflow:visible; }
  .progress-fill { height:100%; border-radius:5px; transition:width .6s ease; position:relative; z-index:1; }
  .milestones { position:relative; height:36px; margin-top:4px; }
  .milestone { position:absolute; transform:translateX(-50%); text-align:center; }
  .milestone .dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--gray-300); background:var(--card); margin:0 auto 4px; position:relative; z-index:2; }
  .milestone .dot.completed { background:var(--success); border-color:var(--success); }
  .milestone .dot.current { background:var(--warning); border-color:var(--warning); box-shadow:0 0 0 4px rgba(217,119,6,.2); }
  .milestone .name { font-size:11px; color:var(--gray-500); white-space:nowrap; }
  .milestone .dot.completed + .name { color:var(--success); }

  .dept-details { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; padding-top:16px; border-top:1px solid var(--gray-200); }
  .detail-item { display:flex; align-items:center; gap:8px; font-size:13px; }
  .detail-item .label { color:var(--gray-500); }
  .detail-item .value { color:var(--gray-700); font-weight:500; }

  /* Stage summary bars */
  .stage-summary { margin-top:16px; padding-top:16px; border-top:1px solid var(--gray-200); display:flex; flex-direction:column; gap:8px; }
  .stage-summary-row { display:flex; align-items:center; gap:10px; font-size:12px; }
  .stage-summary-label { min-width:140px; color:var(--gray-700); font-weight:500; display:flex; align-items:center; gap:6px; }
  .stage-summary-label .snum { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:5px; background:var(--primary); color:#fff; font-size:10px; font-weight:700; flex-shrink:0; }
  .stage-summary-bar { flex:1; height:6px; background:var(--gray-200); border-radius:3px; overflow:hidden; }
  .stage-summary-fill { height:100%; border-radius:3px; transition:width .4s; }
  .stage-summary-pct { min-width:36px; text-align:right; color:var(--gray-500); font-weight:500; }

  .expand-btn { width:100%; padding:8px; border:none; background:var(--gray-100); border-radius:8px; cursor:pointer; font-size:13px; color:var(--gray-500); margin-top:12px; transition:background .2s; }
  .expand-btn:hover { background:var(--gray-200); }

  .stage-detail-panel { display:none; margin-top:12px; }
  .stage-detail-panel.show { display:block; }
  .stage-group { margin-bottom:16px; border:1px solid var(--gray-200); border-radius:10px; overflow:hidden; }
  .stage-group-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:var(--gray-100); cursor:pointer; user-select:none; }
  .stage-group-header:hover { background:var(--gray-200); }
  .stage-group-title { font-size:14px; font-weight:600; color:var(--gray-900); display:flex; align-items:center; gap:8px; }
  .stage-group-title .stage-num { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:6px; background:var(--primary); color:#fff; font-size:11px; font-weight:700; }
  .stage-group-body { padding:0; }

  .sub-step { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid var(--gray-100); transition:background .2s; }
  .sub-step:last-child { border-bottom:none; }
  .sub-step:hover { background:#fafbfd; }
  .sub-step-check { width:20px; height:20px; border-radius:50%; border:2px solid var(--gray-300); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; }
  .sub-step-check.done { background:var(--success); border-color:var(--success); color:#fff; }
  .sub-step-check.wip { background:var(--warning); border-color:var(--warning); color:#fff; }
  .sub-step-info { flex:1; min-width:0; }
  .sub-step-name { font-size:13px; font-weight:500; color:var(--gray-900); }
  .sub-step-desc { font-size:11px; color:var(--gray-500); margin-top:2px; }
  .sub-step-meta { display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .sub-step-status { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:500; }

  .stage-mini-progress { display:flex; gap:3px; align-items:center; }
  .stage-mini-dot { width:8px; height:8px; border-radius:50%; background:var(--gray-200); }
  .stage-mini-dot.done { background:var(--success); }
  .stage-mini-dot.wip { background:var(--warning); }

  .status-tag { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:500; }
  .status-done { background:var(--success-light); color:var(--success); }
  .status-wip { background:var(--warning-light); color:var(--warning); }
  .status-todo { background:var(--gray-100); color:var(--gray-500); }

  /* Admin edit button on sub-steps */
  .sub-step-toggle { display:none; padding:3px 10px; border-radius:8px; border:1px solid var(--gray-200); background:var(--card); cursor:pointer; font-size:11px; color:var(--gray-500); transition:all .15s; white-space:nowrap; }
  .sub-step-toggle:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-light); }
  body.admin-mode .sub-step-toggle { display:inline-block; }

  /* Save floating bar */
  .save-bar { position:fixed; bottom:0; left:0; right:0; background:var(--primary); color:#fff; padding:12px 24px; display:none; align-items:center; justify-content:center; gap:16px; z-index:100; box-shadow:0 -4px 12px rgba(0,0,0,.15); }
  .save-bar.show { display:flex; }
  .save-bar .save-msg { font-size:14px; }
  .save-bar button { padding:8px 24px; border-radius:8px; border:none; font-size:14px; font-weight:600; cursor:pointer; }
  .save-bar .save-btn { background:#fff; color:var(--primary); }
  .save-bar .save-btn:hover { background:var(--primary-light); }
  .save-bar .cancel-btn { background:transparent; color:#fff; border:1px solid rgba(255,255,255,.4); }

  /* Modal */
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--card); border-radius:var(--radius); padding:32px; width:360px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .modal h3 { font-size:18px; color:var(--gray-900); margin-bottom:16px; }
  .modal input { width:100%; padding:10px 14px; border:1px solid var(--gray-200); border-radius:8px; font-size:14px; margin-bottom:12px; outline:none; }
  .modal input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
  .modal .modal-btns { display:flex; gap:8px; justify-content:flex-end; }
  .modal button { padding:8px 20px; border-radius:8px; border:none; font-size:14px; cursor:pointer; }
  .modal .btn-primary { background:var(--primary); color:#fff; }
  .modal .btn-cancel { background:var(--gray-100); color:var(--gray-500); }
  .modal .error { color:var(--danger); font-size:12px; margin-bottom:8px; display:none; }

  /* Log */
  .log-list { display:flex; flex-direction:column; gap:12px; }
  .log-item { background:var(--card); border-radius:var(--radius); padding:16px 20px; box-shadow:var(--shadow); display:flex; gap:16px; align-items:flex-start; }
  .log-date { min-width:90px; font-size:13px; color:var(--gray-500); font-weight:500; }
  .log-dept-tag { padding:2px 10px; border-radius:12px; font-size:11px; font-weight:500; background:var(--primary-light); color:var(--primary); min-width:56px; text-align:center; }
  .log-content { flex:1; font-size:14px; color:var(--gray-700); }
  .log-author { font-size:12px; color:var(--gray-500); min-width:50px; text-align:right; }

  /* Filter */
  .filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .filter-chip { padding:6px 14px; border-radius:20px; border:1px solid var(--gray-200); background:var(--card); cursor:pointer; font-size:13px; color:var(--gray-500); transition:all .2s; }
  .filter-chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }
  .filter-chip:hover { border-color:var(--primary); color:var(--primary); }
  .filter-chip.active:hover { color:#fff; }

  .loading { text-align:center; padding:60px; color:var(--gray-500); }
  .loading .spinner { width:40px; height:40px; border:3px solid var(--gray-200); border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (max-width:768px) {
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .dept-details { grid-template-columns:1fr; }
    .header h1 { font-size:22px; }
    .admin-btn { position:static; margin-top:12px; justify-content:center; }
  }

  /* Requirements */
  .req-grid { display:flex; flex-direction:column; gap:16px; }
  .req-dept-section { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .req-dept-header { padding:16px 20px; font-size:16px; font-weight:600; color:#fff; display:flex; justify-content:space-between; align-items:center; }
  .req-dept-count { font-size:12px; font-weight:400; opacity:.8; background:rgba(255,255,255,.2); padding:2px 10px; border-radius:12px; }
  .req-item { padding:14px 20px; border-bottom:1px solid var(--gray-100); display:flex; gap:14px; align-items:flex-start; transition:background .15s; }
  .req-item:last-child { border-bottom:none; }
  .req-item:hover { background:var(--gray-100); }
  .req-priority { min-width:36px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; margin-top:2px; }
  .req-priority.p-high { background:#fce4ec; color:#c62828; }
  .req-priority.p-mid { background:#fff8e1; color:#f57f17; }
  .req-priority.p-low { background:#e8f5e9; color:#2e7d32; }
  .req-info { flex:1; min-width:0; }
  .req-name { font-size:14px; font-weight:600; color:var(--gray-900); margin-bottom:4px; }
  .req-desc { font-size:12px; color:var(--gray-500); line-height:1.5; margin-bottom:6px; }
  .req-tags { display:flex; gap:6px; flex-wrap:wrap; }
  .req-tag { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:500; }
  .req-tag.feasible { background:#c8e6c9; color:#2e7d32; }
  .req-tag.verify { background:#fff9c4; color:#f57f17; }
  .req-tag.thirdparty { background:#ffccbc; color:#bf360c; }
  .req-analysis { font-size:12px; color:var(--gray-500); max-width:300px; flex-shrink:0; line-height:1.5; }
  .req-note { font-size:11px; color:var(--warning); margin-top:4px; }

  /* Toast */
  .toast { position:fixed; top:20px; right:20px; padding:12px 20px; border-radius:10px; color:#fff; font-size:14px; z-index:300; opacity:0; transform:translateY(-10px); transition:all .3s; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.success { background:var(--success); }
  .toast.error { background:var(--danger); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="boardTitle">各部门AI提效进度看板</h1>
    <p id="companyName">加载中...</p>
    <div class="sync-time">最近同步: <span id="syncTime">--</span></div>
    <button class="admin-btn" id="adminBtn" onclick="handleAdminClick()">
      <span id="adminIcon">🔒</span> <span id="adminLabel">管理员</span>
    </button>
  </div>

  <div class="stats-row" style="grid-template-columns:repeat(4,1fr)">
    <div class="stat-card"><div class="num" id="statDepts">-</div><div class="label">参与部门</div></div>
    <div class="stat-card"><div class="num" id="statAvg">-</div><div class="label">平均进度</div></div>
    <div class="stat-card"><div class="num" id="statSubComplete">-</div><div class="label">已完成子步骤</div></div>
    <div class="stat-card"><div class="num" id="statReqs">-</div><div class="label">需求总数</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="progress">进度总览</button>
    <button class="tab" data-tab="requirements">部门需求</button>
    <button class="tab" data-tab="logs">更新日志</button>
  </div>

  <div class="tab-content active" id="tab-progress">
    <div class="filter-bar" id="deptFilter"></div>
    <div class="dept-grid" id="deptGrid">
      <div class="loading"><div class="spinner"></div>加载数据中...</div>
    </div>
  </div>

  <div class="tab-content" id="tab-requirements">
    <div class="filter-bar" id="reqFilter"></div>
    <div class="req-grid" id="reqGrid"></div>
  </div>

  <div class="tab-content" id="tab-logs">
    <div class="log-list" id="logList"></div>
  </div>
</div>

<!-- Save Bar -->
<div class="save-bar" id="saveBar">
  <span class="save-msg">有 <strong id="changeCount">0</strong> 项更改未保存</span>
  <button class="save-btn" onclick="saveChanges()">保存到看板</button>
  <button class="cancel-btn" onclick="cancelChanges()">撤销</button>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h3>管理员登录</h3>
    <input type="password" id="adminPwd" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="error" id="loginError">密码错误</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('loginModal')">取消</button>
      <button class="btn-primary" onclick="doLogin()">登录</button>
    </div>
  </div>
</div>

<!-- Token Modal -->
<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <h3>设置 GitHub Token</h3>
    <p style="font-size:12px;color:var(--gray-500);margin-bottom:12px">首次保存需要输入 GitHub Personal Access Token（需要 repo 权限）。Token 仅保存在当前浏览器会话中。</p>
    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" onkeydown="if(event.key==='Enter')saveToken()">
    <div class="error" id="tokenError">Token 无效</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('tokenModal')">取消</button>
      <button class="btn-primary" onclick="saveToken()">确认</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ 配置 ============
const GITHUB_REPO = 'wkxd974/ai-improvement-dashboard';
const ADMIN_PWD_HASH = ''; // 留空则使用下方默认密码
const DEFAULT_PWD = 'haidilao2026'; // 默认管理员密码，请修改

// ============ 全局状态 ============
const DEPT_ICONS = {'市场部':'📢','销售部':'💰','技术部':'💻','人事部':'👥','财务部':'📊','运营部':'⚙️','客服部':'🎧','产品部':'🎯','研发部':'🔬','设计部':'🎨','法务部':'⚖️','行政部':'🏢','采购部':'📦','质量部':'✅','商业分析部':'📋'};
const DEPT_COLORS = ['#2563eb','#059669','#7c3aed','#dc2626','#d97706','#0891b2','#be185d','#4f46e5','#15803d','#c2410c'];
const STAGE_WEIGHTS = {'需求调研':10,'模型选择与提示词学习':20,'自动化工作流学习':30,'全面应用':25,'持续优化':15};
const STATUS_CYCLE = ['未开始','进行中','已完成'];

let DATA = null;
let isAdmin = false;
let pendingChanges = {}; // { "dept|stageName|subName": newStatus }

// ============ 数据加载 ============
async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    DATA = await res.json();
  } catch(e) {
    DATA = getDemoData();
  }
  render();
}

function getDemoData() {
  return {
    config: { company: '', title: '各部门AI提效进度看板', syncTime: new Date().toISOString(), stages: ['需求调研','模型选择与提示词学习','自动化工作流学习','全面应用','持续优化'] },
    departments: [], subStages: [], subStageProgress: [], milestones: [], logs: []
  };
}

// ============ 管理员 ============
function handleAdminClick() {
  if (isAdmin) {
    isAdmin = false;
    document.body.classList.remove('admin-mode');
    document.getElementById('adminBtn').classList.remove('active');
    document.getElementById('adminIcon').textContent = '🔒';
    document.getElementById('adminLabel').textContent = '管理员';
    cancelChanges();
    showToast('已退出管理员模式', 'success');
  } else {
    document.getElementById('loginModal').classList.add('show');
    document.getElementById('adminPwd').value = '';
    document.getElementById('adminPwd').focus();
  }
}

function doLogin() {
  const pwd = document.getElementById('adminPwd').value;
  if (pwd === DEFAULT_PWD || (ADMIN_PWD_HASH && sha256(pwd) === ADMIN_PWD_HASH)) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('adminBtn').classList.add('active');
    document.getElementById('adminIcon').textContent = '🔓';
    document.getElementById('adminLabel').textContent = '编辑中';
    closeModal('loginModal');
    render(); // Re-render with edit buttons
    showToast('管理员模式已开启，点击子步骤状态可切换', 'success');
  } else {
    document.getElementById('loginError').style.display = 'block';
    setTimeout(() => document.getElementById('loginError').style.display = 'none', 2000);
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

// ============ 状态切换 ============
function toggleSubStatus(dept, stageName, subName) {
  if (!isAdmin) return;
  const key = `${dept}|${stageName}|${subName}`;

  // Find current effective status
  const sp = (DATA.subStageProgress||[]).find(p => p.dept===dept && p.stageName===stageName && p.subName===subName);
  let currentStatus = pendingChanges[key] || (sp ? sp.status : '未开始');
  let idx = STATUS_CYCLE.indexOf(currentStatus);
  let newStatus = STATUS_CYCLE[(idx + 1) % 3];

  // If reverting to original, remove from pending
  const origStatus = sp ? sp.status : '未开始';
  if (newStatus === origStatus) {
    delete pendingChanges[key];
  } else {
    pendingChanges[key] = newStatus;
  }

  updateSaveBar();
  // 局部更新而非全量 render，避免折叠收起
  updateSubStepInPlace(dept, stageName, subName, newStatus, newStatus !== origStatus);
  updateStageGroupHeader(dept, stageName);
  updateStats();
}

function updateSaveBar() {
  const count = Object.keys(pendingChanges).length;
  document.getElementById('changeCount').textContent = count;
  document.getElementById('saveBar').classList.toggle('show', count > 0);
}

// ============ 局部更新（不重新渲染整个页面）============
function updateSubStepInPlace(dept, stageName, subName, newStatus, isPending) {
  // 找到对应的 sub-step 元素
  const allToggles = document.querySelectorAll('.sub-step-toggle');
  allToggles.forEach(btn => {
    if (btn.getAttribute('onclick').includes(escAttr(dept)) &&
        btn.getAttribute('onclick').includes(escAttr(stageName)) &&
        btn.getAttribute('onclick').includes(escAttr(subName))) {
      const subStep = btn.closest('.sub-step');
      if (!subStep) return;

      // 更新 check icon
      const check = subStep.querySelector('.sub-step-check');
      check.className = 'sub-step-check ' + (newStatus === '已完成' ? 'done' : newStatus === '进行中' ? 'wip' : '');
      check.textContent = newStatus === '已完成' ? '✓' : newStatus === '进行中' ? '◐' : '';

      // 更新 status tag
      const statusTag = subStep.querySelector('.sub-step-status');
      statusTag.className = 'sub-step-status ' + (newStatus === '已完成' ? 'status-done' : newStatus === '进行中' ? 'status-wip' : 'status-todo');
      statusTag.textContent = newStatus;

      // 更新 pending 高亮
      subStep.style.outline = isPending ? '2px solid var(--warning)' : '';
      subStep.style.outlineOffset = isPending ? '-2px' : '';
      subStep.style.borderRadius = isPending ? '4px' : '';
    }
  });
}

function escAttr(s) { return s.replace(/'/g, "\\'"); }

function updateStageGroupHeader(dept, stageName) {
  // 重新计算该阶段的 mini dots 和状态
  const stages = DATA.config.stages || [];
  const subStages = DATA.subStages || [];
  const subStageProgress = DATA.subStageProgress || [];

  const defs = subStages.filter(ss => ss.stageName === stageName);
  const subs = defs.map(d => {
    const prog = subStageProgress.find(p => p.dept === dept && p.stageName === stageName && p.subName === d.subName);
    const key = `${dept}|${stageName}|${d.subName}`;
    return { status: pendingChanges[key] || (prog ? prog.status : '未开始') };
  });

  const doneCount = subs.filter(s => s.status === '已完成').length;
  const wipCount = subs.filter(s => s.status === '进行中').length;
  let stageSt = '未开始';
  if (doneCount === subs.length && subs.length > 0) stageSt = '已完成';
  else if (doneCount > 0 || wipCount > 0) stageSt = '进行中';

  // 找到对应的 stage-group-header
  document.querySelectorAll('.stage-group-header').forEach(header => {
    const title = header.querySelector('.stage-group-title');
    if (!title) return;
    if (title.textContent.includes(stageName)) {
      const card = header.closest('.dept-card');
      if (!card) return;
      const cardName = card.querySelector('.dept-name');
      if (!cardName || !cardName.textContent.includes(dept)) return;

      // 更新 mini dots
      const miniProgress = header.querySelector('.stage-mini-progress');
      if (miniProgress) {
        miniProgress.innerHTML = subs.map(sub => {
          const dc = sub.status === '已完成' ? 'done' : sub.status === '进行中' ? 'wip' : '';
          return `<div class="stage-mini-dot ${dc}"></div>`;
        }).join('');
      }

      // 更新 count
      const countSpan = title.querySelector('span');
      if (countSpan) countSpan.textContent = `(${doneCount}/${subs.length})`;

      // 更新 status tag
      const tag = header.querySelector('.status-tag');
      if (tag) {
        tag.className = 'status-tag ' + (stageSt === '已完成' ? 'status-done' : stageSt === '进行中' ? 'status-wip' : 'status-todo');
        tag.textContent = stageSt;
      }
    }
  });
}

function updateStats() {
  if (!DATA) return;
  let subComplete = 0;
  (DATA.subStageProgress || []).forEach(sp => {
    const key = `${sp.dept}|${sp.stageName}|${sp.subName}`;
    const effectiveStatus = pendingChanges[key] || sp.status;
    if (effectiveStatus === '已完成') subComplete++;
  });
  document.getElementById('statSubComplete').textContent = subComplete;
}

function cancelChanges() {
  pendingChanges = {};
  updateSaveBar();
  render();
}

// ============ 保存到 GitHub ============
async function saveChanges() {
  const token = sessionStorage.getItem('gh_token');
  if (!token) {
    document.getElementById('tokenModal').classList.add('show');
    document.getElementById('ghToken').value = '';
    document.getElementById('ghToken').focus();
    return;
  }
  await doSave(token);
}

function saveToken() {
  const token = document.getElementById('ghToken').value.trim();
  if (!token || !token.startsWith('ghp_')) {
    document.getElementById('tokenError').style.display = 'block';
    setTimeout(() => document.getElementById('tokenError').style.display = 'none', 2000);
    return;
  }
  sessionStorage.setItem('gh_token', token);
  closeModal('tokenModal');
  doSave(token);
}

async function doSave(token) {
  const saveBtn = document.querySelector('.save-btn');
  saveBtn.textContent = '保存中...';
  saveBtn.disabled = true;

  try {
    // 1. Apply pending changes to DATA
    for (const [key, newStatus] of Object.entries(pendingChanges)) {
      const [dept, stageName, subName] = key.split('|');
      const sp = DATA.subStageProgress.find(p => p.dept===dept && p.stageName===stageName && p.subName===subName);
      if (sp) {
        sp.status = newStatus;
        if (newStatus === '已完成') sp.completedDate = new Date().toISOString().slice(0,10);
      }
    }

    // 2. Recalculate department progress
    recalcProgress();

    // 3. Update syncTime
    DATA.config.syncTime = new Date().toISOString();

    // 4. Get current file SHA
    const metaRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/data.json`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (!metaRes.ok) throw new Error('无法获取仓库文件信息，请检查Token权限');
    const meta = await metaRes.json();

    // 5. Push updated data.json
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(DATA, null, 2))));
    const pushRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/data.json`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `看板更新: ${new Date().toLocaleString('zh-CN')}`,
        content: content,
        sha: meta.sha
      })
    });

    if (!pushRes.ok) {
      const err = await pushRes.json();
      throw new Error(err.message || '推送失败');
    }

    pendingChanges = {};
    updateSaveBar();
    render();
    showToast('保存成功！看板将在1-2分钟内更新', 'success');
  } catch(e) {
    showToast('保存失败: ' + e.message, 'error');
    if (e.message.includes('Token') || e.message.includes('401')) {
      sessionStorage.removeItem('gh_token');
    }
  } finally {
    saveBtn.textContent = '保存到看板';
    saveBtn.disabled = false;
  }
}

function recalcProgress() {
  const stages = DATA.config.stages || [];
  const deptSubs = {};
  DATA.subStageProgress.forEach(sp => {
    if (!deptSubs[sp.dept]) deptSubs[sp.dept] = {};
    if (!deptSubs[sp.dept][sp.stageName]) deptSubs[sp.dept][sp.stageName] = [];
    deptSubs[sp.dept][sp.stageName].push(sp.status);
  });

  DATA.departments.forEach(dept => {
    const subs = deptSubs[dept.name] || {};
    let totalProgress = 0;
    let currentStage = stages[0] || '';

    stages.forEach(stage => {
      const statuses = subs[stage] || [];
      const done = statuses.filter(s => s==='已完成').length;
      const wip = statuses.filter(s => s==='进行中').length;

      if (done === statuses.length && statuses.length > 0) {
        dept.stages[stage] = '已完成';
      } else if (done > 0 || wip > 0) {
        dept.stages[stage] = '进行中';
      } else {
        dept.stages[stage] = '未开始';
      }

      const weight = STAGE_WEIGHTS[stage] || (100/stages.length);
      totalProgress += weight * (statuses.length ? done/statuses.length : 0);
    });

    // Determine current stage
    for (const stage of stages) {
      if (dept.stages[stage] === '进行中') { currentStage = stage; break; }
      if (dept.stages[stage] === '未开始') { currentStage = stage; break; }
    }

    dept.progress = Math.min(Math.round(totalProgress), 100);
    dept.stage = currentStage;
    dept.updated = new Date().toISOString().slice(0,10);
  });
}

// ============ 渲染 ============
function render() {
  if (!DATA) return;
  const { config, departments, logs, subStages, subStageProgress } = DATA;
  const stages = config.stages || ['需求调研','模型选择与提示词学习','自动化工作流学习','全面应用','持续优化'];

  document.getElementById('boardTitle').textContent = config.title || '各部门AI提效进度看板';
  document.getElementById('companyName').textContent = config.company || '';
  document.getElementById('syncTime').textContent = config.syncTime ? new Date(config.syncTime).toLocaleString('zh-CN') : '--';
  document.getElementById('statDepts').textContent = departments.length;
  const avg = departments.length ? departments.reduce((s,d) => s + d.progress, 0) / departments.length : 0;
  document.getElementById('statAvg').textContent = Math.round(avg) + '%';

  let subComplete = 0;
  if (subStageProgress && subStageProgress.length) {
    subStageProgress.forEach(sp => {
      const key = `${sp.dept}|${sp.stageName}|${sp.subName}`;
      const effectiveStatus = pendingChanges[key] || sp.status;
      if(effectiveStatus === '已完成') subComplete++;
    });
  }
  document.getElementById('statSubComplete').textContent = subComplete;
  document.getElementById('statReqs').textContent = (DATA.requirements||[]).length;

  // Build sub-stage lookup
  const subLookup = {};
  if (subStages && subStages.length) {
    const defs = {};
    subStages.forEach(ss => {
      if (!defs[ss.stageName]) defs[ss.stageName] = [];
      defs[ss.stageName].push({ subName: ss.subName, description: ss.description });
    });
    departments.forEach(dept => {
      subLookup[dept.name] = {};
      Object.keys(defs).forEach(stageName => {
        subLookup[dept.name][stageName] = defs[stageName].map(d => {
          const prog = (subStageProgress||[]).find(p => p.dept === dept.name && p.stageName === stageName && p.subName === d.subName);
          const key = `${dept.name}|${stageName}|${d.subName}`;
          return {
            subName: d.subName, description: d.description,
            status: pendingChanges[key] || (prog ? prog.status : '未开始'),
            isPending: key in pendingChanges
          };
        });
      });
    });
  }

  const deptNames = departments.map(d => d.name);
  renderFilter('deptFilter', deptNames, (sel) => renderDepts(departments, stages, sel, subLookup));
  renderDepts(departments, stages, null, subLookup);
  renderLogs(logs||[]);

  // 需求Tab
  const reqs = DATA.requirements || [];
  const reqDepts = [...new Set(reqs.map(r => r.dept))];
  renderFilter('reqFilter', reqDepts, (sel) => renderRequirements(reqs, sel));
  renderRequirements(reqs, null);
}

function renderFilter(containerId, items, onChange) {
  const el = document.getElementById(containerId);
  el.innerHTML = '<button class="filter-chip active" data-dept="all">全部</button>' +
    items.map(n => `<button class="filter-chip" data-dept="${n}">${n}</button>`).join('');
  el.querySelectorAll('.filter-chip').forEach(btn => {
    btn.onclick = () => {
      el.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onChange(btn.dataset.dept === 'all' ? null : btn.dataset.dept);
    };
  });
}

function renderStageSummary(dept, stages, deptSubs) {
  const STAGE_COLORS = ['#2563eb','#059669','#7c3aed','#d97706','#0891b2'];
  const rows = stages.map((stageName, si) => {
    const subs = deptSubs[stageName] || [];
    const total = subs.length;
    const done = subs.filter(s => s.status === '已完成').length;
    const wip = subs.filter(s => s.status === '进行中').length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const color = STAGE_COLORS[si % STAGE_COLORS.length];
    return `<div class="stage-summary-row">
      <div class="stage-summary-label"><span class="snum" style="background:${color}">${si+1}</span>${stageName}</div>
      <div class="stage-summary-bar"><div class="stage-summary-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="stage-summary-pct" style="color:${pct===100?'var(--success)':'var(--gray-500)'}">${done}/${total}</div>
    </div>`;
  }).join('');
  return `<div class="stage-summary">${rows}</div>`;
}

function renderDepts(departments, stages, filter, subLookup) {
  const grid = document.getElementById('deptGrid');
  const depts = filter ? departments.filter(d => d.name === filter) : departments;
  grid.innerHTML = depts.map((dept, i) => {
    const color = DEPT_COLORS[i % DEPT_COLORS.length];
    const icon = DEPT_ICONS[dept.name] || '📋';

    const msHtml = stages.map((s, si) => {
      const pct = ((si + 1) / stages.length * 100).toFixed(1);
      const stageKey = Object.keys(dept.stages||{}).find(k => k === s || k.includes(s) || s.includes(k));
      const status = stageKey ? dept.stages[stageKey] : '未开始';
      const dotClass = status === '已完成' ? 'completed' : status === '进行中' ? 'current' : '';
      return `<div class="milestone" style="left:${pct}%"><div class="dot ${dotClass}"></div><div class="name">${s}</div></div>`;
    }).join('');

    const deptSubs = subLookup[dept.name] || {};
    const stageGroupsHtml = stages.map((stageName, si) => {
      const subs = deptSubs[stageName] || [];
      if (!subs.length) {
        const stageKey = Object.keys(dept.stages||{}).find(k => k === stageName || k.includes(stageName) || stageName.includes(k));
        const st = stageKey ? dept.stages[stageKey] : '未开始';
        const cls = st === '已完成' ? 'status-done' : st === '进行中' ? 'status-wip' : 'status-todo';
        return `<div class="stage-group"><div class="stage-group-header"><div class="stage-group-title"><span class="stage-num">${si+1}</span>${stageName}</div><span class="status-tag ${cls}">${st}</span></div></div>`;
      }

      const miniDots = subs.map(sub => {
        const dc = sub.status === '已完成' ? 'done' : sub.status === '进行中' ? 'wip' : '';
        return `<div class="stage-mini-dot ${dc}"></div>`;
      }).join('');

      const doneCount = subs.filter(s => s.status === '已完成').length;
      const stageKey = Object.keys(dept.stages||{}).find(k => k === stageName || k.includes(stageName) || stageName.includes(k));
      const stageSt = stageKey ? dept.stages[stageKey] : '未开始';
      const cls = stageSt === '已完成' ? 'status-done' : stageSt === '进行中' ? 'status-wip' : 'status-todo';

      const subsHtml = subs.map(sub => {
        const checkClass = sub.status === '已完成' ? 'done' : sub.status === '进行中' ? 'wip' : '';
        const checkIcon = sub.status === '已完成' ? '✓' : sub.status === '进行中' ? '◐' : '';
        const stCls = sub.status === '已完成' ? 'status-done' : sub.status === '进行中' ? 'status-wip' : 'status-todo';
        const pendingMark = sub.isPending ? ' style="outline:2px solid var(--warning);outline-offset:-2px;border-radius:4px"' : '';
        const eDept = dept.name.replace(/'/g,"\\'");
        const eStageName = stageName.replace(/'/g,"\\'");
        const eSubName = sub.subName.replace(/'/g,"\\'");
        return `<div class="sub-step"${pendingMark}>
          <div class="sub-step-check ${checkClass}">${checkIcon}</div>
          <div class="sub-step-info"><div class="sub-step-name">${sub.subName}</div><div class="sub-step-desc">${sub.description}</div></div>
          <div class="sub-step-meta">
            <span class="sub-step-status ${stCls}">${sub.status}</span>
            <button class="sub-step-toggle" onclick="toggleSubStatus('${eDept}','${eStageName}','${eSubName}')">切换</button>
          </div>
        </div>`;
      }).join('');

      return `<div class="stage-group">
        <div class="stage-group-header"><div class="stage-group-title"><span class="stage-num">${si+1}</span>${stageName}<span style="font-size:11px;color:var(--gray-500);font-weight:400;margin-left:4px">(${doneCount}/${subs.length})</span></div>
        <div style="display:flex;align-items:center;gap:8px"><div class="stage-mini-progress">${miniDots}</div><span class="status-tag ${cls}">${stageSt}</span></div></div>
        <div class="stage-group-body" style="display:none">${subsHtml}</div>
      </div>`;
    }).join('');

    return `<div class="dept-card">
      <div class="dept-header"><div class="dept-name"><div class="icon" style="background:${color}15;color:${color}">${icon}</div>${dept.name}</div>
      <span class="dept-badge ${dept.progress >= 100 ? 'badge-done' : 'badge-progress'}">${dept.stage}</span></div>
      <div class="progress-section"><div class="progress-info"><span>总进度</span><span class="pct">${dept.progress}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${dept.progress}%;background:linear-gradient(90deg,${color}88,${color})"></div></div>
      <div class="milestones">${msHtml}</div></div>
      <div class="dept-details"><div class="detail-item"><span class="label">负责人:</span><span class="value">${dept.owner||'--'}</span></div>
      <div class="detail-item"><span class="label">更新日期:</span><span class="value">${dept.updated||'--'}</span></div>
      <div class="detail-item" style="grid-column:1/-1"><span class="label">当前情况:</span><span class="value">${dept.note||'--'}</span></div></div>
      ${renderStageSummary(dept, stages, deptSubs)}
      <button class="expand-btn" onclick="toggleDetail(this)">展开阶段详情 ▼</button>
      <div class="stage-detail-panel">${stageGroupsHtml}</div>
    </div>`;
  }).join('');
}

function toggleDetail(btn) {
  const panel = btn.nextElementSibling;
  const show = !panel.classList.contains('show');
  panel.classList.toggle('show');
  btn.textContent = show ? '收起阶段详情 ▲' : '展开阶段详情 ▼';
}

document.addEventListener('click', function(e) {
  const header = e.target.closest('.stage-group-header');
  if (!header) return;
  const body = header.nextElementSibling;
  if (!body) return;
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
});

function renderLogs(logs) {
  const list = document.getElementById('logList');
  list.innerHTML = logs.length ? logs.map(l => `
    <div class="log-item"><div class="log-date">${l.date}</div><div class="log-dept-tag">${l.dept}</div>
    <div class="log-content">${l.content}</div><div class="log-author">${l.author||''}</div></div>
  `).join('') : '<div style="text-align:center;color:var(--gray-500);padding:40px">暂无更新日志</div>';
}

function renderRequirements(requirements, filter) {
  const grid = document.getElementById('reqGrid');
  if (!requirements || !requirements.length) {
    grid.innerHTML = '<div style="text-align:center;color:var(--gray-500);padding:40px">暂无部门需求数据</div>';
    return;
  }
  const DEPT_HEADER_COLORS = {'人事部':'#2E75B6','财务部':'#548235','市场部':'#BF8F00','商业分析部':'#2563eb'};
  const reqs = filter ? requirements.filter(r => r.dept === filter) : requirements;

  // Group by dept
  const grouped = {};
  reqs.forEach(r => { if (!grouped[r.dept]) grouped[r.dept] = []; grouped[r.dept].push(r); });

  grid.innerHTML = Object.entries(grouped).map(([dept, items]) => {
    const color = DEPT_HEADER_COLORS[dept] || '#64748b';
    const rows = items.map(r => {
      const pCls = r.priority === '高' ? 'p-high' : r.priority === '中' ? 'p-mid' : 'p-low';
      const fCls = r.feasibility.includes('直接') ? 'feasible' : r.feasibility.includes('验证') ? 'verify' : 'thirdparty';
      return `<div class="req-item">
        <div class="req-priority ${pCls}">${r.priority}</div>
        <div class="req-info">
          <div class="req-name">${r.name}</div>
          <div class="req-desc">${r.description}</div>
          <div class="req-tags"><span class="req-tag ${fCls}">${r.feasibility}</span></div>
          ${r.note ? '<div class="req-note">⚠ '+r.note+'</div>' : ''}
        </div>
        <div class="req-analysis">${r.analysis}</div>
      </div>`;
    }).join('');
    return `<div class="req-dept-section">
      <div class="req-dept-header" style="background:${color}">${dept}<span class="req-dept-count">${items.length}项需求</span></div>
      ${rows}
    </div>`;
  }).join('');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  };
});

loadData();
